<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Magic Panel | Central de Ferramentas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #10141f 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #eef2ff;
        }

        /* container principal */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* cabeçalho elegante */
        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF 0%, #b9c6ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #8d9bcf;
            font-weight: 450;
            font-size: 1rem;
            border-bottom: 1px dashed #2a2f45;
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        /* grade responsiva */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
        }

        /* card mágico */
        .magic-card {
            background: rgba(18, 23, 38, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            border: 1px solid rgba(80, 100, 180, 0.35);
            transition: all 0.25s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .magic-card:hover {
            transform: translateY(-5px);
            border-color: rgba(140, 170, 255, 0.7);
            background: rgba(22, 28, 48, 0.85);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
        }

        .card-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            height: 100%;
            color: inherit;
        }

        /* área superior com imagem e título */
        .card-media {
            padding: 1.8rem 1.8rem 0.8rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .icon-wrapper {
            background: linear-gradient(145deg, #1e243f, #111624);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.3);
        }

        .icon-img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .card-title {
            font-size: 1.45rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            line-height: 1.3;
            word-break: break-word;
            color: #f0f3ff;
        }

        /* corpo do card com metadados */
        .card-details {
            padding: 1.2rem 1.8rem 1.8rem 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .detail-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            border-bottom: 1px dotted rgba(255,255,255,0.1);
            padding-bottom: 6px;
        }

        .detail-label {
            font-weight: 600;
            color: #9aa9e6;
            min-width: 98px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #dbe4ff;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            flex: 1;
        }

        .badge-target {
            background: #2a2f5a;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #cbd5ff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .timestamp {
            font-family: monospace;
            font-size: 0.75rem;
            background: #0f1222;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .url-truncate {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* rodapé sutil */
        .footer-info {
            text-align: center;
            font-size: 0.75rem;
            padding-top: 2rem;
            color: #556393;
            border-top: 1px solid #1e253f;
            margin-top: 2rem;
        }

        @media (max-width: 680px) {
            body {
                padding: 1.2rem;
            }
            .card-title {
                font-size: 1.2rem;
            }
            .detail-label {
                min-width: 75px;
            }
        }

        /* animação suave */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .magic-card {
            animation: fadeSlide 0.4s ease forwards;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>✨ Magic Logs | Portal Unificado</h1>
        <p>Registrador de atividades & atalhos dinâmicos</p>
    </div>

    <div class="grid-cards" id="cardsContainer">
        <!-- Os cards serão inseridos dinamicamente via JavaScript a partir dos dados fornecidos -->
    </div>
    <div class="footer-info">
        🧙‍♂️ Central de ferramentas · Dados atualizados via metadata · Clique em qualquer card para acessar o link
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // Dados fornecidos conforme especificação do prompt
    // Incluindo os 4 registros (o último repetido, mantemos os dois registros 
    // originais, embora o terceiro e o quarto sejam idênticos, mas respeitamos a lista completa)
    // --------------------------------------------------------------
    const itemsData = [
        {
            criado_em: "15 de março de 2026 às 11:38:52 UTC-3",
            timestamp_raw: "2026-03-15T14:38:52Z", // aproximado para ordenação (UTC-3 -> 11:38:52)
            link_url: "https://wazzimagiygg.com/paginas/actions/",
            menu_target: "menu_iniciar",
            site_id: "wazzimagiygg",
            titulo: "Registrador de Logs (Para qualquer usuário)",
            url_imagem: "iconmagic.png"
        },
        {
            criado_em: "17 de março de 2026 às 19:33:12 UTC-3",
            timestamp_raw: "2026-03-17T22:33:12Z",
            link_url: "https://wazzimagiygg.com/paginas/skyfemboy/",
            menu_target: "ferramentas",
            site_id: "wazzimagiygg",
            titulo: "Chat de Projetos",
            url_imagem: "iconmagic.png"
        },
        {
            criado_em: "30 de março de 2026 às 16:08:50 UTC-3",
            timestamp_raw: "2026-03-30T19:08:50Z",
            link_url: "https://wazzimagiygg.com/paginas/kilometrosz/",
            menu_target: "ferramentas",
            site_id: "wazzimagiygg",
            titulo: "Kilometrosz",
            url_imagem: "iconmagic.png"
        },
        {
            criado_em: "30 de março de 2026 às 16:08:50 UTC-3",
            timestamp_raw: "2026-03-30T19:08:50Z",
            link_url: "https://wazzimagiygg.com/paginas/kilometrosz/",
            menu_target: "ferramentas",
            site_id: "wazzimagiygg",
            titulo: "Kilometrosz",
            url_imagem: "iconmagic.png"
        }
    ];

    // Função auxiliar para ordenar por data (mais recente primeiro - opcional, manteremos a ordem original mas mostrando timestamp)
    // melhor garantir consistência: ordenar por timestamp decrescente (mais novo primeiro) ou ordem original? 
    // Usaremos ordem original (primeiro a 15/03, depois 17/03 e depois dois iguais 30/03)
    // Mas também podemos exibir exatamente como vieram. O solicitante não pediu ordenação específica, 
    // então preservamos a sequência de criação do array.

    // Para enriquecimento visual, verificamos se a imagem padrão existe (usamos fallback caso iconmagic.png não carregue)
    // mas como é um recurso local (mesmo domínio) colocamos com URL relativa ou absoluta? No contexto da página usaremos a 
    // mesma base do link_url para gerar o src da imagem? O melhor é usar o caminho relativo, embora a página seja standalone.
    // Vamos assumir que "iconmagic.png" está no mesmo diretório raiz ou relativo. Para garantir, usaremos o endereço
    // baseado no site_id? Mas o ideal é apenas "./iconmagic.png" ou tentar usar o domínio. Como não temos certeza,
    // usamos uma string que tenta carregar a imagem a partir do diretório atual, mas também adicionamos um backup 
    // com um ícone inline caso falhe (SVG). Além disso, o target _blank é seguro.

    // Função para formatar timestamp legível (já temos criado_em bonito, mas também pode padronizar)
    function buildCard(item) {
        // tratar possível falta de url_imagem
        const imgSrc = item.url_imagem || "iconmagic.png";
        // título limpo
        const titulo = item.titulo || "Sem título";
        const linkUrl = item.link_url;
        const menuTarget = item.menu_target;
        const siteId = item.site_id;
        const criado = item.criado_em;

        // para exibir label adicional "ID do Site"
        return `
            <div class="magic-card">
                <a href="${escapeHtml(linkUrl)}" class="card-link" target="_blank" rel="noopener noreferrer">
                    <div class="card-media">
                        <div class="icon-wrapper">
                            <img src="${escapeHtml(imgSrc)}" 
                                 alt="ícone" 
                                 class="icon-img"
                                 onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%238c9eff\'%3E%3Cpath d=\'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z\'/%3E%3C/svg%3E';">
                        </div>
                        <div class="card-title">${escapeHtml(titulo)}</div>
                    </div>
                    <div class="card-details">
                        <div class="detail-row">
                            <span class="detail-label">📅 CRIADO</span>
                            <span class="detail-value timestamp">${escapeHtml(criado)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">🔗 LINK</span>
                            <span class="detail-value url-truncate" title="${escapeHtml(linkUrl)}">${escapeHtml(linkUrl)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">🎯 MENU_TARGET</span>
                            <span class="detail-value badge-target">${escapeHtml(menuTarget)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">🏷️ SITE_ID</span>
                            <span class="detail-value">${escapeHtml(siteId)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">🖼️ IMAGEM</span>
                            <span class="detail-value">${escapeHtml(imgSrc)}</span>
                        </div>
                    </div>
                </a>
            </div>
        `;
    }

    // pequena função para evitar XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Montagem dos cards
    const container = document.getElementById('cardsContainer');
    if (container) {
        let cardsHTML = '';
        // iterar sobre todos os itens (incluindo o quarto item idêntico ao terceiro, conforme requisito)
        for (let idx = 0; idx < itemsData.length; idx++) {
            cardsHTML += buildCard(itemsData[idx]);
        }
        container.innerHTML = cardsHTML;
    }

    // opcional: adicionar suporte a log no console para verificação dos dados
    console.log("📋 Magic Painel carregado com", itemsData.length, "registros (incluindo duplicidade solicitada).");
</script>

<!-- Detalhe adicional: a página exibe todos os campos obrigatórios:
     criado_em, link_url, menu_target, site_id, titulo, url_imagem
     em cada card, com link clicável abrindo em nova aba.
     O timestamp também aparece diretamente. A formatação visual está fiel aos dados.
-->
</body>
</html>
