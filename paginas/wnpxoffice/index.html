<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Central de Gestão | Painel Rápido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #080c17);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #eef2ff;
        }

        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* cabeçalho com identidade */
        .header {
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #b3c7ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.75rem;
        }

        .header p {
            color: #8f9ed4;
            font-weight: 450;
            font-size: 1rem;
            background: rgba(20, 28, 48, 0.6);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* grade flexível */
        .grid-manager {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 2rem;
        }

        /* card de ferramenta */
        .tool-card {
            background: rgba(16, 21, 35, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            border: 1px solid rgba(90, 120, 200, 0.3);
            transition: all 0.25s ease;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .tool-card:hover {
            transform: translateY(-6px);
            border-color: rgba(130, 170, 255, 0.7);
            background: rgba(22, 29, 50, 0.85);
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .card-inner-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            height: 100%;
            color: inherit;
        }

        /* área superior com ícone e título */
        .card-icon-area {
            padding: 1.8rem 1.5rem 1rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-badge {
            width: 54px;
            height: 54px;
            background: linear-gradient(145deg, #212b4a, #11172e);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .tool-title {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            line-height: 1.3;
            word-break: break-word;
            color: #f2f5ff;
        }

        /* descrição sutil + ação */
        .card-description {
            padding: 1.2rem 1.8rem 1.5rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .url-preview {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #7c89b3;
            background: rgba(0, 0, 0, 0.35);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .action-hint {
            background: rgba(80, 110, 200, 0.2);
            border-radius: 30px;
            padding: 0.3rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b9cbff;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .tool-card:hover .action-hint {
            background: rgba(110, 140, 230, 0.4);
            color: white;
        }

        /* rodapé com estatística */
        .footer-stats {
            text-align: center;
            font-size: 0.75rem;
            padding-top: 2rem;
            color: #516395;
            border-top: 1px solid #1a2340;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .badge-count {
            background: #121b33;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-family: monospace;
        }

        @media (max-width: 680px) {
            body {
                padding: 1.2rem;
            }
            .tool-title {
                font-size: 1.2rem;
            }
            .icon-badge {
                width: 46px;
                height: 46px;
                font-size: 1.5rem;
            }
            .url-preview {
                max-width: 100%;
                white-space: normal;
                word-break: break-all;
            }
            .card-description {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* animação suave */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tool-card {
            animation: fadeUp 0.35s ease forwards;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>📋 Central de Gestão</h1>
        <p>Ferramentas administrativas · acesso direto na mesma página</p>
    </div>

    <div class="grid-manager" id="linksContainer">
        <!-- os cards serão gerados dinamicamente -->
    </div>

    <div class="footer-stats">
        <span class="badge-count">🔗 todos os links abrem na mesma aba</span>
        <span class="badge-count">⚡ gestão unificada</span>
        <span class="badge-count">📌 clique e utilize</span>
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // Lista de links fornecida para gerenciar, abrindo sempre na mesma página (target="_self")
    // Cada link contém um título amigável (derivado da URL ou manual), ícone dinâmico
    // baseado no nome do recurso. Para melhor UX, usamos identificadores únicos.
    // ------------------------------------------------------------------
    const linksData = [
        {
            url: "https://wazzimagiygg.com/paginas/panilha/",
            titulo: "Panilha Inteligente",
            descricao: "Planilhas colaborativas e dados",
            emoji: "📊"
        },
        {
            url: "https://wazzimagiygg.com/paginas/blocodenotas/",
            titulo: "Bloco de Notas",
            descricao: "Anotações rápidas e organização",
            emoji: "📝"
        },
        {
            url: "https://wazzimagiygg.com/paginas/prontuariomultifuncionalformatado/",
            titulo: "Prontuário Multifuncional",
            descricao: "Formato avançado para registros",
            emoji: "📋"
        },
        {
            url: "https://wazzimagiygg.com/paginas/calculadorauniversal/",
            titulo: "Calculadora Universal",
            descricao: "Operações matemáticas e conversões",
            emoji: "🧮"
        },
        {
            url: "https://wazzimagiygg.com/paginas/prontuariouniversal/",
            titulo: "Prontuário Universal",
            descricao: "Base completa de informações",
            emoji: "📁"
        },
        {
            url: "https://wazzimagiygg.com/central/geral/",
            titulo: "Central Geral",
            descricao: "Acesso à dashboard principal",
            emoji: "🏛️"
        }
    ];

    // Função para extrair um nome amigável caso precise (mas já definimos títulos bonitos)
    // Para evitar XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Gera um card para cada link, com target="_self" (mesma página)
    function buildCard(item) {
        const { url, titulo, descricao, emoji } = item;
        // pequena exibição da url de forma resumida (apenas para contexto, sem expor tudo)
        let urlShort = url.replace('https://wazzimagiygg.com', '...');
        if (urlShort.length > 45) urlShort = urlShort.substring(0, 42) + '...';
        
        return `
            <div class="tool-card">
                <a href="${escapeHtml(url)}" class="card-inner-link" target="_self" rel="noopener noreferrer">
                    <div class="card-icon-area">
                        <div class="icon-badge">
                            ${escapeHtml(emoji)}
                        </div>
                        <div class="tool-title">${escapeHtml(titulo)}</div>
                    </div>
                    <div class="card-description">
                        <span class="url-preview" title="${escapeHtml(url)}">${escapeHtml(urlShort)}</span>
                        <span class="action-hint">
                            <span>🖱️ acessar →</span>
                        </span>
                    </div>
                </a>
            </div>
        `;
    }

    // Renderizar todos os cards no container
    const container = document.getElementById('linksContainer');
    if (container) {
        let allCards = '';
        for (let i = 0; i < linksData.length; i++) {
            allCards += buildCard(linksData[i]);
        }
        container.innerHTML = allCards;
    }

    // Mensagem de inicialização no console (modo gestão)
    console.log(`✅ Central de Gestão: ${linksData.length} ferramentas carregadas.`);
    console.log("📌 Comportamento: todos os links abrem na MESMA aba (target=_self)");
    console.log("🔗 Links gerenciados: panilha, bloco de notas, prontuários, calculadora e central geral.");
</script>

<!--
    Página completa para gestão dos links fornecidos:
    - https://wazzimagiygg.com/paginas/panilha/
    - https://wazzimagiygg.com/paginas/blocodenotas/
    - https://wazzimagiygg.com/paginas/prontuariomultifuncionalformatado/
    - https://wazzimagiygg.com/paginas/calculadorauniversal/
    - https://wazzimagiygg.com/paginas/prontuariouniversal/
    - https://wazzimagiygg.com/central/geral/
    
    * Cada link abre na mesma página (target="_self")
    * Design elegante com cards, cada um contendo título amigável, ícone e pré-visualização da rota.
    * Gestão visual limpa, responsiva e moderna.
-->
</body>
</html>
