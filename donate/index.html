<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WazzimaGiygg - Apoie nosso projeto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 1.5em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            transform: translateY(-2px);
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2em;
            color: rgba(255,255,255,0.8);
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #e94560;
        }

        .section-title {
            font-size: 1.8em;
            margin-bottom: 30px;
            text-align: center;
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .goal-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .goal-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }

        .goal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .goal-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .goal-description {
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .btn-donate-goal {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-donate-goal:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }

        .free-donation {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 50px;
        }

        .donation-amounts {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .amount-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .amount-btn:hover, .amount-btn.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            transform: scale(1.05);
        }

        .custom-donation {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .custom-donation input {
            padding: 15px 20px;
            border-radius: 50px;
            border: none;
            width: 200px;
            font-size: 1em;
        }

        .btn-donate {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-donate:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }

        .recent-donations {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }

        .donation-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .donation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .donor-name {
            font-weight: 600;
        }

        .donor-message {
            font-size: 0.85em;
            color: rgba(255,255,255,0.6);
        }

        .donation-amount {
            color: #e94560;
            font-weight: 700;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #1a1a2e;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }

        .close-modal:hover {
            color: #e94560;
        }

        .pix-area {
            text-align: center;
        }

        .pix-key-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pix-key-card:hover, .pix-key-card.selected {
            background: rgba(233,69,96,0.3);
            border: 1px solid #e94560;
        }

        .pix-key-code {
            font-family: monospace;
            font-size: 1em;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .invoice-area {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .invoice-field {
            margin-bottom: 15px;
        }

        .invoice-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: rgba(255,255,255,0.7);
        }

        .invoice-field input, .invoice-field textarea, .invoice-field select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.9);
        }

        .btn-confirm, .btn-success {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .admin-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .btn-secondary {
            background: #6c757d;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .goals-table {
            width: 100%;
            border-collapse: collapse;
        }

        .goals-table th, .goals-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .login-required {
            text-align: center;
            padding: 60px;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .goals-table { font-size: 12px; display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <div class="logo">
            <img src="https://wazzimagiygg.com/favicom.png" alt="WazzimaGiygg" style="height: 40px;">
            <span>WazzimaGiygg</span>
        </div>
        <div class="nav-links">
            <button class="nav-btn" onclick="showHome()">🏠 Início</button>
            <button class="nav-btn" onclick="showGoals()">🎯 Metas</button>
            <button class="nav-btn" id="admin-btn" style="display: none;" onclick="showAdmin()">👑 Admin</button>
            <button class="nav-btn" onclick="showMyDonations()">📋 Minhas Doações</button>
            <button class="nav-btn" id="login-nav-btn" onclick="showLoginModal()">🔑 Entrar</button>
            <button class="nav-btn" id="logout-nav-btn" style="display: none;" onclick="logout()">🚪 Sair</button>
        </div>
    </div>
</div>

<div class="main-container" id="main-container">
    <div style="text-align:center; padding:60px;">Carregando...</div>
</div>

<div class="footer">
    <p>💝 WazzimaGiygg - Seu apoio mantém nossos serviços no ar!</p>
    <p>📄 Todas as doações geram comprovante eletrônico com valor de doação.</p>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🔐 Entrar</h3>
            <span class="close-modal" onclick="closeModal('login-modal')">&times;</span>
        </div>
        <div class="modal-body">
            <p>Faça login para apoiar o projeto WazzimaGiygg</p>
            <button id="google-login-btn" class="btn-primary" style="width:100%; margin-top:20px;">🔑 Entrar com Google</button>
        </div>
    </div>
</div>

<!-- Donation Modal -->
<div id="donation-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="donation-modal-title">💝 Fazer Doação</h3>
            <span class="close-modal" onclick="closeModal('donation-modal')">&times;</span>
        </div>
        <div class="modal-body" id="donation-modal-body"></div>
    </div>
</div>

<!-- Invoice Modal -->
<div id="invoice-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📄 Comprovante de Doação</h3>
            <span class="close-modal" onclick="closeModal('invoice-modal')">&times;</span>
        </div>
        <div class="modal-body" id="invoice-body"></div>
    </div>
</div>

<!-- Verificar se Firebase já não está carregado -->
<script>
    if (typeof firebase === 'undefined') {
        var script = document.createElement('script');
        script.src = 'https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js';
        script.onload = function() {
            var authScript = document.createElement('script');
            authScript.src = 'https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js';
            authScript.onload = function() {
                var firestoreScript = document.createElement('script');
                firestoreScript.src = 'https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js';
                firestoreScript.onload = initApp;
                document.head.appendChild(firestoreScript);
            };
            document.head.appendChild(authScript);
        };
        document.head.appendChild(script);
    } else {
        initApp();
    }

    function initApp() {
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let isAdmin = false;
        let goals = [];
        let recentDonations = [];
        let selectedAmount = 10;
        let selectedGoal = null;

        const ADMIN_UIDS = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1', '6aPqWVh8JVYL5NqEb78iDGPD7dH3'];

        // Referências Firestore
        const wazzmaRef = db.collection('wazzmagiygg');
        const donationsRef = () => wazzmaRef.doc('doacoes').collection('registros');
        const goalsRef = () => wazzmaRef.doc('metas').collection('itens');

        const storePixKeys = [
            { type: 'cnpj', key: '12.345.678/0001-90', description: 'CNPJ WazzimaGiygg' },
            { type: 'email', key: 'financeiro@wazzimagiygg.com', description: 'E-mail Financeiro' },
            { type: 'random', key: 'doacao.wazzima@juntos', description: 'Chave Aleatória' }
        ];

        // ============================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ============================================

        async function checkIsAdmin(user) {
            if (!user) return false;
            if (ADMIN_UIDS.includes(user.uid)) return true;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                return userDoc.exists && userDoc.data().isAdmin === true;
            } catch { return false; }
        }

        function updateUIForUser() {
            const loginBtn = document.getElementById('login-nav-btn');
            const logoutBtn = document.getElementById('logout-nav-btn');
            const adminBtn = document.getElementById('admin-btn');
            
            if (currentUser) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'flex';
                adminBtn.style.display = isAdmin ? 'flex' : 'none';
            } else {
                loginBtn.style.display = 'flex';
                logoutBtn.style.display = 'none';
                adminBtn.style.display = 'none';
            }
        }

        async function loginWithGoogle() {
            try {
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                closeModal('login-modal');
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }

        async function logout() {
            await auth.signOut();
            currentUser = null;
            isAdmin = false;
            updateUIForUser();
            showHome();
        }

        // ============================================
        // FUNÇÕES DE CARREGAMENTO
        // ============================================

        async function loadGoals() {
            try {
                const snapshot = await goalsRef().orderBy('createdAt', 'desc').get();
                goals = [];
                snapshot.forEach(doc => {
                    goals.push({ id: doc.id, ...doc.data() });
                });
                return goals;
            } catch (error) {
                console.error('Erro ao carregar metas:', error);
                return [];
            }
        }

        async function loadRecentDonations() {
            try {
                const snapshot = await donationsRef().orderBy('createdAt', 'desc').limit(20).get();
                recentDonations = [];
                snapshot.forEach(doc => {
                    recentDonations.push({ id: doc.id, ...doc.data() });
                });
                return recentDonations;
            } catch (error) {
                console.error('Erro ao carregar doações:', error);
                return [];
            }
        }

        async function loadTotalDonations() {
            try {
                const snapshot = await donationsRef().get();
                let total = 0;
                snapshot.forEach(doc => {
                    total += (doc.data().amount || 0);
                });
                return total;
            } catch (error) {
                return 0;
            }
        }

        // ============================================
        // TELAS PRINCIPAIS
        // ============================================

        async function showHome() {
            await loadGoals();
            await loadRecentDonations();
            const totalDonations = await loadTotalDonations();
            
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="hero">
                    <h1>💝 Ajude a manter o WazzimaGiygg no ar!</h1>
                    <p>Sua contribuição mantém nossos serviços gratuitos e acessíveis para todos</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">R$ ${totalDonations.toLocaleString('pt-BR')}</div><div>Total Arrecadado</div></div>
                    <div class="stat-card"><div class="stat-number">${recentDonations.length}</div><div>Doações Realizadas</div></div>
                    <div class="stat-card"><div class="stat-number">${goals.length}</div><div>Metas Ativas</div></div>
                </div>
                
                <div class="free-donation">
                    <h2>🎁 Faça uma Doação</h2>
                    <p>Escolha um valor ou doe o quanto quiser</p>
                    <div class="donation-amounts">
                        <button class="amount-btn" onclick="selectDonationAmount(10)">R$ 10</button>
                        <button class="amount-btn" onclick="selectDonationAmount(20)">R$ 20</button>
                        <button class="amount-btn" onclick="selectDonationAmount(50)">R$ 50</button>
                        <button class="amount-btn" onclick="selectDonationAmount(100)">R$ 100</button>
                    </div>
                    <div class="custom-donation">
                        <input type="number" id="custom-amount" placeholder="Outro valor" min="1">
                        <button class="btn-donate" onclick="startDonation()">💝 Doar Agora</button>
                    </div>
                </div>
                
                <h2 class="section-title">🎯 Metas de Arrecadação</h2>
                <div class="goals-grid" id="goals-grid"></div>
                
                <div class="recent-donations">
                    <h3>📋 Últimas Doações</h3>
                    <div class="donation-list" id="donation-list"></div>
                </div>
            `;
            
            const goalsGrid = document.getElementById('goals-grid');
            if (goals.length === 0) {
                goalsGrid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Nenhuma meta cadastrada ainda.</p>';
            } else {
                goalsGrid.innerHTML = goals.map(goal => {
                    const progress = ((goal.current || 0) / goal.target) * 100;
                    return `
                        <div class="goal-card">
                            <div class="goal-icon">${goal.icon || '🎯'}</div>
                            <div class="goal-title">${escapeHtml(goal.title)}</div>
                            <div class="goal-description">${escapeHtml(goal.description || '')}</div>
                            <div class="goal-stats"><span>R$ ${(goal.current || 0).toLocaleString('pt-BR')}</span><span>R$ ${goal.target.toLocaleString('pt-BR')}</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(progress, 100)}%"></div></div>
                            <button class="btn-donate-goal" onclick="startDonationForGoal('${goal.id}')">🎯 Doar para esta meta</button>
                        </div>
                    `;
                }).join('');
            }
            
            const donationList = document.getElementById('donation-list');
            if (recentDonations.length === 0) {
                donationList.innerHTML = '<p style="text-align:center;">Seja o primeiro a doar! 💝</p>';
            } else {
                donationList.innerHTML = recentDonations.map(d => `
                    <div class="donation-item">
                        <div><div class="donor-name">${escapeHtml(d.donorName || 'Anônimo')}</div><div class="donor-message">${escapeHtml(d.message || '💝 Apoiando o projeto')}</div></div>
                        <div class="donation-amount">R$ ${(d.amount || 0).toLocaleString('pt-BR')}</div>
                    </div>
                `).join('');
            }
        }

        function showGoals() {
            const container = document.getElementById('main-container');
            if (goals.length === 0) {
                container.innerHTML = `<div class="hero"><h1>🎯 Metas de Arrecadação</h1><p>Ajude-nos a alcançar nossas metas!</p></div><div style="text-align:center; padding:60px;"><p>Nenhuma meta cadastrada no momento.</p><button class="btn-primary" onclick="showHome()">← Voltar</button></div>`;
                return;
            }
            
            container.innerHTML = `
                <div class="hero"><h1>🎯 Metas de Arrecadação</h1><p>Contribua com as metas que mais fazem sentido para você</p></div>
                <div class="goals-grid">${goals.map(goal => {
                    const progress = ((goal.current || 0) / goal.target) * 100;
                    return `
                        <div class="goal-card">
                            <div class="goal-icon">${goal.icon || '🎯'}</div>
                            <div class="goal-title">${escapeHtml(goal.title)}</div>
                            <div class="goal-description">${escapeHtml(goal.description || '')}</div>
                            <div class="goal-stats"><span>R$ ${(goal.current || 0).toLocaleString('pt-BR')}</span><span>R$ ${goal.target.toLocaleString('pt-BR')}</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(progress, 100)}%"></div></div>
                            <button class="btn-donate-goal" onclick="startDonationForGoal('${goal.id}')">🎯 Doar para esta meta</button>
                        </div>
                    `;
                }).join('')}</div>
                <div style="text-align:center; margin-top:30px;"><button class="btn-secondary" onclick="showHome()">← Voltar para Início</button></div>
            `;
        }

        async function showMyDonations() {
            if (!currentUser) { showLoginModal(); return; }
            
            try {
                const snapshot = await donationsRef().where('donorId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
                const myDonations = [];
                snapshot.forEach(doc => myDonations.push({ id: doc.id, ...doc.data() }));
                
                const container = document.getElementById('main-container');
                if (myDonations.length === 0) {
                    container.innerHTML = `<div class="hero"><h1>📋 Minhas Doações</h1><p>Você ainda não realizou nenhuma doação.</p></div><div style="text-align:center;"><button class="btn-primary" onclick="showHome()">💝 Fazer minha primeira doação</button></div>`;
                } else {
                    let totalDonated = myDonations.reduce((sum, d) => sum + (d.amount || 0), 0);
                    container.innerHTML = `
                        <div class="hero"><h1>📋 Minhas Doações</h1><p>Você já contribuiu com <strong>R$ ${totalDonated.toLocaleString('pt-BR')}</strong> para o projeto</p></div>
                        <div class="recent-donations"><h3>Histórico de Doações</h3>
                        <div class="donation-list">${myDonations.map(d => `
                            <div class="donation-item">
                                <div><div class="donor-name">${formatDate(d.createdAt)}</div><div class="donor-message">${escapeHtml(d.message || 'Doação realizada')}</div></div>
                                <div class="donation-amount">R$ ${(d.amount || 0).toLocaleString('pt-BR')}</div>
                            </div>
                        `).join('')}</div>
                        <div style="text-align:center; margin-top:20px;"><button class="btn-primary" onclick="showHome()">💝 Fazer nova doação</button></div></div>`;
                }
            } catch (error) { alert('Erro: ' + error.message); }
        }

        // ============================================
        // SISTEMA DE DOAÇÃO
        // ============================================

        function selectDonationAmount(amount) {
            selectedAmount = amount;
            selectedGoal = null;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        }

        function startDonation() {
            const customAmount = document.getElementById('custom-amount')?.value;
            if (customAmount && parseFloat(customAmount) > 0) {
                selectedAmount = parseFloat(customAmount);
                selectedGoal = null;
            } else if (!selectedAmount) {
                selectedAmount = 10;
            }
            openDonationModal();
        }

        function startDonationForGoal(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (goal) { selectedGoal = goal; selectedAmount = null; openDonationModal(); }
        }

        function openDonationModal() {
            if (!currentUser) { showLoginModal(); return; }
            
            const modalBody = document.getElementById('donation-modal-body');
            const title = document.getElementById('donation-modal-title');
            
            if (selectedGoal) {
                title.innerHTML = `🎯 Doar para: ${escapeHtml(selectedGoal.title)}`;
            } else {
                title.innerHTML = `💝 Doação de R$ ${selectedAmount.toFixed(2)}`;
            }
            
            modalBody.innerHTML = `
                <div class="pix-area">
                    <h4>Escolha a chave PIX para doação:</h4>
                    ${storePixKeys.map(key => `<div class="pix-key-card" onclick="window.selectPixKey('${key.key}', '${key.type}')" data-key="${key.key}"><strong>${getPixTypeName(key.type)}</strong><br><code>${escapeHtml(key.key)}</code><br><small>${escapeHtml(key.description)}</small></div>`).join('')}
                    <div id="selected-pix-display" style="margin-top: 20px;"></div>
                    <div class="invoice-area">
                        <h4>📄 Dados para o comprovante (opcional):</h4>
                        <div class="invoice-field"><label>Nome completo</label><input type="text" id="donor-name" placeholder="Como gostaria de ser identificado" value="${escapeHtml(currentUser.displayName || '')}"></div>
                        <div class="invoice-field"><label>Mensagem (opcional)</label><textarea id="donor-message" rows="2" placeholder="Deixe uma mensagem de apoio..."></textarea></div>
                        <div class="invoice-field"><label>CPF/CNPJ (para emissão de recibo)</label><input type="text" id="donor-document" placeholder="Opcional"></div>
                    </div>
                    <button id="generate-payment-btn" class="btn-primary" style="width:100%; margin-top:20px;" disabled>✅ Confirmar e Gerar Pagamento</button>
                </div>
            `;
            document.getElementById('donation-modal').style.display = 'flex';
            window.selectedPixKey = null;
        }

        window.selectPixKey = function(key, type) {
            window.selectedPixKey = { key, type };
            document.querySelectorAll('.pix-key-card').forEach(card => {
                card.classList.remove('selected');
                if (card.getAttribute('data-key') === key) card.classList.add('selected');
            });
            document.getElementById('selected-pix-display').innerHTML = `<div style="background:rgba(40,167,69,0.2); border-radius:12px; padding:15px;"><p>✅ Chave PIX selecionada:</p><div class="pix-key-code">${escapeHtml(key)}</div></div>`;
            const btn = document.getElementById('generate-payment-btn');
            btn.disabled = false;
            btn.innerHTML = '💳 Gerar Pagamento PIX';
            btn.onclick = () => generatePixPayment();
        };

        function getPixTypeName(type) {
            const types = { 'cnpj': '🏢 CNPJ', 'cpf': '📄 CPF', 'email': '📧 E-mail', 'phone': '📱 Telefone', 'random': '🎲 Chave Aleatória' };
            return types[type] || type;
        }

        function generatePixPayment() {
            if (!window.selectedPixKey) { alert('Selecione uma chave PIX primeiro!'); return; }
            
            const amount = selectedGoal ? 50 : selectedAmount;
            const goalId = selectedGoal ? selectedGoal.id : null;
            const donorName = document.getElementById('donor-name')?.value || 'Anônimo';
            const donorMessage = document.getElementById('donor-message')?.value || '';
            const donorDocument = document.getElementById('donor-document')?.value || '';
            
            const pixCode = `00020126360014BR.GOV.BCB.PIX0114${window.selectedPixKey.key.replace(/[^a-zA-Z0-9]/g, '')}5204000053039865404${Math.floor(amount)}5802BR5925DOACAO WA${Date.now()}`;
            
            const modalBody = document.getElementById('donation-modal-body');
            modalBody.innerHTML = `
                <div class="pix-area">
                    <h3>💳 Pagamento PIX</h3>
                    <p>Valor: <strong>R$ ${amount.toFixed(2)}</strong></p>
                    <p>Chave PIX: <strong>${escapeHtml(window.selectedPixKey.key)}</strong></p>
                    <div class="pix-key-code">${pixCode}</div>
                    <button class="btn-secondary" onclick="copyPixCode('${pixCode}')">📋 Copiar Código PIX</button>
                    <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.1); border-radius:12px;">
                        <p>📌 Após realizar o pagamento, clique no botão abaixo para confirmar sua doação.</p>
                        <button class="btn-success" onclick="confirmDonation(${amount}, '${goalId}', '${escapeHtml(donorName)}', '${escapeHtml(donorMessage)}', '${escapeHtml(donorDocument)}')">✅ Já Paguei - Confirmar Doação</button>
                    </div>
                </div>
            `;
        }

        function copyPixCode(code) { navigator.clipboard.writeText(code); alert('✅ Código PIX copiado!'); }

        async function confirmDonation(amount, goalId, donorName, donorMessage, donorDocument) {
            if (!currentUser) { alert('Faça login novamente'); return; }
            try {
                const donationData = {
                    donorId: currentUser.uid, donorEmail: currentUser.email, donorName: donorName || currentUser.displayName || 'Anônimo',
                    donorDocument: donorDocument || '', message: donorMessage || '', amount: amount, goalId: goalId || null,
                    status: 'completed', paymentMethod: 'pix', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                const docRef = await donationsRef().add(donationData);
                
                if (goalId) {
                    const goalRef = goalsRef().doc(goalId);
                    const goalDoc = await goalRef.get();
                    if (goalDoc.exists) { await goalRef.update({ current: (goalDoc.data().current || 0) + amount }); }
                }
                
                closeModal('donation-modal');
                showInvoice(docRef.id, donationData);
                await loadGoals();
                await loadRecentDonations();
            } catch (error) { alert('Erro: ' + error.message); }
        }

        function showInvoice(donationId, data) {
            const invoiceNumber = `WZM-${donationId.substring(0, 8).toUpperCase()}`;
            const modalBody = document.getElementById('invoice-body');
            modalBody.innerHTML = `
                <div style="text-align:center;">
                    <h2>📄 COMPROVANTE DE DOAÇÃO</h2>
                    <hr style="margin:15px 0;">
                    <div style="text-align:left;"><p><strong>Nº:</strong> ${invoiceNumber}</p><p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p><p><strong>Doador:</strong> ${escapeHtml(data.donorName)}</p><p><strong>E-mail:</strong> ${escapeHtml(data.donorEmail)}</p>${data.donorDocument ? `<p><strong>CPF/CNPJ:</strong> ${escapeHtml(data.donorDocument)}</p>` : ''}</div>
                    <hr><h3>Valor: R$ ${data.amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</h3><hr>
                    <p>Forma de Pagamento: PIX<br>Status: ✅ Confirmado</p>
                    <button class="btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
                    <button class="btn-primary" onclick="closeModal('invoice-modal'); showHome();">Fechar</button>
                </div>
            `;
            document.getElementById('invoice-modal').style.display = 'flex';
        }

        // ============================================
        // ADMIN
        // ============================================

        async function showAdmin() {
            if (!isAdmin) { alert('Acesso restrito'); return; }
            await loadGoals();
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="admin-panel">
                    <div class="admin-header"><h2>👑 Painel Administrativo</h2><div><button class="btn-primary" onclick="showAddGoalForm()">➕ Adicionar Meta</button><button class="btn-secondary" onclick="showAdminStats()">📊 Estatísticas</button></div></div>
                    <h3>🎯 Metas</h3><table class="goals-table"><thead><tr><th>Meta</th><th>Progresso</th><th>Arrecadado</th><th>Meta</th><th>Ações</th></tr></thead><tbody id="admin-goals-list"></tbody></table>
                </div>`;
            const tbody = document.getElementById('admin-goals-list');
            if (goals.length === 0) tbody.innerHTML = '<tr><td colspan="5">Nenhuma meta</td></tr>';
            else tbody.innerHTML = goals.map(g => `<tr><td>${escapeHtml(g.title)}</td><td><div class="progress-bar" style="width:100px;"><div class="progress-fill" style="width:${((g.current||0)/g.target)*100}%"></div></div></td><td>R$ ${(g.current||0).toLocaleString()}</td><td>R$ ${g.target.toLocaleString()}</td><td><button class="btn-danger" onclick="deleteGoal('${g.id}')">🗑️</button></td></tr>`).join('');
        }

        function showAddGoalForm() {
            const modalBody = document.getElementById('donation-modal-body');
            document.getElementById('donation-modal-title').innerHTML = '🎯 Adicionar Meta';
            modalBody.innerHTML = `<form id="add-goal-form"><div class="form-group"><label>Título</label><input type="text" id="goal-title" required></div><div class="form-group"><label>Descrição</label><textarea id="goal-description" rows="3"></textarea></div><div class="form-group"><label>Valor da Meta (R$)</label><input type="number" step="0.01" id="goal-target" required></div><div class="form-group"><label>Ícone</label><input type="text" id="goal-icon" placeholder="🎯"></div><button type="submit" class="btn-primary">✨ Criar Meta</button></form>`;
            document.getElementById('add-goal-form').onsubmit = async (e) => {
                e.preventDefault();
                await goalsRef().add({ title: document.getElementById('goal-title').value, description: document.getElementById('goal-description').value, target: parseFloat(document.getElementById('goal-target').value), icon: document.getElementById('goal-icon').value || '🎯', current: 0, active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert('✅ Meta criada!');
                closeModal('donation-modal');
                showAdmin();
            };
            document.getElementById('donation-modal').style.display = 'flex';
        }

        async function deleteGoal(id) { if (confirm('Excluir?')) { await goalsRef().doc(id).delete(); showAdmin(); } }

        async function showAdminStats() {
            const total = await loadTotalDonations();
            const modalBody = document.getElementById('donation-modal-body');
            document.getElementById('donation-modal-title').innerHTML = '📊 Estatísticas';
            modalBody.innerHTML = `<div style="text-align:center;"><div style="background:rgba(255,255,255,0.1); border-radius:16px; padding:20px;"><h3>💰 Total Arrecadado</h3><p style="font-size:2em; color:#e94560;">R$ ${total.toLocaleString('pt-BR')}</p></div><div style="background:rgba(255,255,255,0.1); border-radius:16px; padding:20px; margin-top:10px;"><h3>🎯 Metas Ativas</h3><p style="font-size:2em;">${goals.length}</p></div><button class="btn-secondary" onclick="closeModal('donation-modal')">Fechar</button></div>`;
            document.getElementById('donation-modal').style.display = 'flex';
        }

        // ============================================
        // UTILIDADES
        // ============================================

        function formatDate(timestamp) { if (!timestamp) return '-'; if (timestamp.toDate) timestamp = timestamp.toDate(); return timestamp.toLocaleDateString('pt-BR'); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function showLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        // ============================================
        // EXPOR FUNÇÕES GLOBAIS
        // ============================================

        window.showHome = showHome;
        window.showGoals = showGoals;
        window.showAdmin = showAdmin;
        window.showMyDonations = showMyDonations;
        window.showLoginModal = showLoginModal;
        window.closeModal = closeModal;
        window.loginWithGoogle = loginWithGoogle;
        window.logout = logout;
        window.selectDonationAmount = selectDonationAmount;
        window.startDonation = startDonation;
        window.startDonationForGoal = startDonationForGoal;
        window.copyPixCode = copyPixCode;
        window.confirmDonation = confirmDonation;
        window.showAddGoalForm = showAddGoalForm;
        window.deleteGoal = deleteGoal;
        window.showAdminStats = showAdminStats;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        document.getElementById('google-login-btn')?.addEventListener('click', loginWithGoogle);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                isAdmin = await checkIsAdmin(user);
                updateUIForUser();
                await loadGoals();
                await loadRecentDonations();
                showHome();
            } else {
                currentUser = null;
                isAdmin = false;
                updateUIForUser();
                document.getElementById('main-container').innerHTML = `
                    <div class="hero"><h1>💝 Ajude a manter o WazzimaGiygg no ar!</h1><p>Sua contribuição mantém nossos serviços gratuitos</p></div>
                    <div class="login-required"><span style="font-size:64px;">🔐</span><h3>Faça login para apoiar o projeto</h3><button class="login-btn" onclick="showLoginModal()">🔑 Entrar com Google</button></div>`;
            }
        });
    }
</script>
</body>
</html>
