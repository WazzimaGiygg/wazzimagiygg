<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrador de Acessos - WazzimaGiygg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .log-area {
            background: #1e1e1e;
            color: #00ff00;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #333;
            font-family: monospace;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .iframe-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📡</span>
            Registrador de Acessos
        </h1>
        <p style="color: #666; margin-bottom: 20px;">Monitoramento e registro de visitantes</p>

        <div class="status" id="status-area">
            <div class="info-row">
                <span class="info-label">📦 Status:</span>
                <span class="info-value" id="status-text">Inicializando...</span>
            </div>
            <div class="info-row">
                <span class="info-label">🖥️ Dispositivo:</span>
                <span class="info-value" id="device-info">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🌐 Navegador:</span>
                <span class="info-value" id="browser-info">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">💻 SO:</span>
                <span class="info-value" id="os-info">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔍 IP:</span>
                <span class="info-value" id="ip-info">Aguardando...</span>
            </div>
            <div class="info-row">
                <span class="info-label">📍 Localização:</span>
                <span class="info-value" id="location-info">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">📄 Página:</span>
                <span class="info-value" id="page-info">-</span>
            </div>
        </div>

        <div id="iframe-info-container"></div>

        <button onclick="registrarAcesso()">
            🔄 Registrar Acesso Manualmente
        </button>

        <div class="log-area" id="log-area">
            <div class="log-entry">🚀 Sistema iniciado...</div>
        </div>
    </div>

    <script>
    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
        authDomain: "wzzm-ce3fc.firebaseapp.com",
        projectId: "wzzm-ce3fc",
        storageBucket: "wzzm-ce3fc.appspot.com",
        messagingSenderId: "249427877153",
        appId: "1:249427877153:web:0e4297294794a5aadeb260"
    };

    // Inicializar Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // Função para adicionar log
    function addLog(message, type = 'info') {
        const logArea = document.getElementById('log-area');
        const timestamp = new Date().toLocaleTimeString();
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        
        let emoji = '📌';
        if (type === 'success') emoji = '✅';
        if (type === 'error') emoji = '❌';
        if (type === 'warning') emoji = '⚠️';
        
        logEntry.innerHTML = `[${timestamp}] ${emoji} ${message}`;
        logArea.appendChild(logEntry);
        logArea.scrollTop = logArea.scrollHeight;
        
        console.log(`[${timestamp}] ${message}`);
    }

    // Detectar se está em iframe
    function isInIframe() {
        try {
            return window.self !== window.top;
        } catch (e) {
            return true;
        }
    }

    // Obter informações do dispositivo
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let browser = 'Desconhecido';
        let os = 'Desconhecido';
        
        // Detectar navegador
        if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
        else if (ua.includes('Edg')) browser = 'Edge';
        else if (ua.includes('Opera')) browser = 'Opera';
        
        // Detectar SO
        if (ua.includes('Windows')) os = 'Windows';
        else if (ua.includes('Mac')) os = 'macOS';
        else if (ua.includes('Linux')) os = 'Linux';
        else if (ua.includes('Android')) os = 'Android';
        else if (ua.includes('iOS')) os = 'iOS';
        
        // Detectar versão do Windows
        if (os === 'Windows') {
            if (ua.includes('Windows NT 10.0')) os = 'Windows 10/11';
            else if (ua.includes('Windows NT 6.1')) os = 'Windows 7';
            else if (ua.includes('Windows NT 6.2')) os = 'Windows 8';
        }
        
        return { browser, os, ua };
    }

    // Obter IP (múltiplas tentativas com fallback)
    async function getIP() {
        const apis = [
            'https://api.ipify.org?format=json',
            'https://api.my-ip.io/ip.json',
            'https://ipapi.co/json/'
        ];
        
        for (const api of apis) {
            try {
                addLog(`Tentando obter IP via ${api.split('/')[2]}...`);
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(api, { 
                    signal: controller.signal,
                    mode: 'cors'
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    let ip = data.ip || data.query || null;
                    
                    if (ip) {
                        addLog(`✅ IP obtido: ${ip}`, 'success');
                        return ip;
                    }
                }
            } catch (error) {
                addLog(`⚠️ Falha na API ${api.split('/')[2]}: ${error.message}`, 'warning');
            }
        }
        
        // Fallback: IP local ou null
        addLog('❌ Não foi possível obter o IP', 'error');
        return null;
    }

    // Obter localização baseada no IP (sem CORS - usando serviço que suporta JSONP)
    async function getLocationByIP(ip) {
        if (!ip) return null;
        
        try {
            // Usar ip-api.com com callback JSONP (evita CORS)
            return new Promise((resolve) => {
                const script = document.createElement('script');
                const callbackName = 'jsonp_callback_' + Date.now();
                
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    
                    if (data && data.status === 'success') {
                        addLog(`📍 Localização: ${data.city}, ${data.regionName}, ${data.country}`, 'success');
                        resolve({
                            city: data.city,
                            region: data.regionName,
                            country: data.country,
                            lat: data.lat,
                            lon: data.lon
                        });
                    } else {
                        resolve(null);
                    }
                };
                
                script.src = `https://ip-api.com/json/${ip}?callback=${callbackName}`;
                document.body.appendChild(script);
                
                // Timeout de 5 segundos
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        resolve(null);
                    }
                }, 5000);
            });
        } catch (error) {
            addLog(`⚠️ Erro ao obter localização: ${error.message}`, 'warning');
            return null;
        }
    }

    // Obter página de origem (para iframes)
    function getParentPage() {
        try {
            if (isInIframe() && document.referrer) {
                return document.referrer;
            }
            return window.location.href;
        } catch (e) {
            return window.location.href;
        }
    }

    // Registrar no Firebase
    async function registrarNoFirebase(data) {
        try {
            const collectionName = isInIframe() ? 'checkuser_iframe' : 'checkuser';
            const docRef = await db.collection(collectionName).add({
                ...data,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                dataHora: new Date().toISOString()
            });
            
            addLog(`✅ Registro salvo no Firebase! ID: ${docRef.id}`, 'success');
            return docRef.id;
        } catch (error) {
            addLog(`❌ Erro ao salvar no Firebase: ${error.message}`, 'error');
            return null;
        }
    }

    // Função principal de registro
    async function registrarAcesso() {
        const startTime = Date.now();
        addLog('🚀 Iniciando registro de acesso...');
        
        // Atualizar UI
        document.getElementById('status-text').innerHTML = '<span class="spinner"></span> Registrando...';
        
        try {
            // Informações básicas
            const inIframe = isInIframe();
            const deviceInfo = getDeviceInfo();
            const parentPage = getParentPage();
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // Atualizar UI com informações do dispositivo
            document.getElementById('device-info').textContent = userAgent.split(' ').slice(0, 3).join(' ');
            document.getElementById('browser-info').textContent = deviceInfo.browser;
            document.getElementById('os-info').textContent = deviceInfo.os;
            document.getElementById('page-info').textContent = parentPage.length > 50 ? parentPage.substring(0, 50) + '...' : parentPage;
            
            // Mostrar info do iframe
            if (inIframe) {
                const iframeContainer = document.getElementById('iframe-info-container');
                iframeContainer.innerHTML = `
                    <div class="iframe-info">
                        <strong>🖼️ Executando dentro de um iframe</strong><br>
                        🔗 Página pai: ${parentPage}<br>
                        📏 Profundidade: Detectado
                    </div>
                `;
                addLog('📦 Detectado execução dentro de iframe', 'warning');
            }
            
            // Obter IP
            const ip = await getIP();
            if (ip) {
                document.getElementById('ip-info').innerHTML = `<span class="badge badge-success">${ip}</span>`;
            } else {
                document.getElementById('ip-info').innerHTML = '<span class="badge badge-danger">Não obtido</span>';
            }
            
            // Obter localização
            let location = null;
            if (ip) {
                location = await getLocationByIP(ip);
                if (location) {
                    document.getElementById('location-info').innerHTML = `
                        ${location.city || '?'}, ${location.region || '?'}, ${location.country || '?'}
                    `;
                } else {
                    document.getElementById('location-info').innerHTML = '<span class="badge badge-warning">Não disponível</span>';
                }
            }
            
            // Preparar dados para Firebase
            const registroData = {
                tipo: inIframe ? 'iframe' : 'direto',
                emIframe: inIframe,
                paginaOrigem: parentPage,
                urlAtual: window.location.href,
                userAgent: userAgent,
                navegador: deviceInfo.browser,
                sistemaOperacional: deviceInfo.os,
                ip: ip || 'desconhecido',
                cidade: location?.city || null,
                regiao: location?.region || null,
                pais: location?.country || null,
                lat: location?.lat || null,
                lon: location?.lon || null,
                resolucaoTela: screenSize,
                idioma: language,
                fusoHorario: timezone,
                agenteCompleto: userAgent,
                tempoExecucao: Date.now() - startTime
            };
            
            // Salvar no Firebase
            const docId = await registrarNoFirebase(registroData);
            
            // Atualizar status final
            const tempoTotal = Date.now() - startTime;
            document.getElementById('status-text').innerHTML = `
                <span class="badge badge-success">✅ Registro concluído!</span>
                <span style="margin-left: 10px; font-size: 12px;">(Tempo: ${tempoTotal}ms)</span>
            `;
            
            addLog(`✨ ===== REGISTRO CONCLUÍDO COM SUCESSO! =====`, 'success');
            addLog(`📄 ID: ${docId || 'N/A'}`, 'success');
            addLog(`⏱️ Tempo total: ${tempoTotal}ms`, 'success');
            
            // Tentar notificar página pai se estiver em iframe
            if (inIframe) {
                try {
                    window.parent.postMessage({
                        type: 'ACCESS_REGISTERED',
                        status: 'success',
                        docId: docId,
                        timestamp: new Date().toISOString()
                    }, '*');
                    addLog('📨 Mensagem enviada para a página pai', 'info');
                } catch (e) {
                    addLog(`⚠️ Não foi possível notificar página pai: ${e.message}`, 'warning');
                }
            }
            
            return registroData;
            
        } catch (error) {
            addLog(`❌ ERRO FATAL: ${error.message}`, 'error');
            document.getElementById('status-text').innerHTML = '<span class="badge badge-danger">❌ Falha no registro</span>';
            return null;
        }
    }

    // Inicialização automática
    async function init() {
        addLog('🚀 Sistema de registro inicializado');
        addLog(`📱 User Agent: ${navigator.userAgent.substring(0, 80)}...`);
        
        if (isInIframe()) {
            addLog('🖼️ Detectado execução dentro de iframe', 'warning');
            addLog(`🔗 Página pai: ${document.referrer || 'Não detectada'}`, 'info');
        } else {
            addLog('🖥️ Execução em página principal');
        }
        
        // Registrar acesso automaticamente após 1 segundo
        setTimeout(() => {
            registrarAcesso();
        }, 1000);
    }
    
    // Iniciar
    init();
    </script>
</body>
</html>
