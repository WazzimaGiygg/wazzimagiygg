<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Texto com Fontes e Formatação</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #editor {
      height: 300px;
      border: 1px solid #ccc;
    }
    #output {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      min-height: 200px;
    }
  </style>
</head>
<body>

  <h1>Editor de Texto Avançado</h1>
  <p>Edite o texto abaixo e veja o código HTML com a fonte e formatação gerados:</p>

  <!-- Editor -->
  <div id="editor"></div>

  <!-- Botão para exportar HTML -->
  <button id="exportButton">Exportar HTML</button>

  <!-- Exibição do código HTML gerado -->
  <div id="output"></div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script>
    // Inicializando o Quill
    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: [
          [{ 'header': '1' }, { 'header': '2' }, { 'font': [] }],
          [{ 'list': 'ordered' }, { 'list': 'bullet' }],
          [{ 'align': [] }],
          ['bold', 'italic', 'underline', 'strike'],
          ['link', 'image', 'video'],
          [{ 'color': [] }, { 'background': [] }],
          ['blockquote', 'code-block'],
          ['clean']
        ]
      }
    });

    // Função para exportar o conteúdo em HTML com formatação embutida
    document.getElementById('exportButton').addEventListener('click', function() {
      // Obter o conteúdo HTML
      var html = quill.root.innerHTML;
      
      // Adicionar formatação CSS embutida no HTML exportado
      var style = "<style>body { font-family: Arial, sans-serif; }</style>";
      var fullHtml = style + html;
      
      // Exibir o HTML no campo de saída
      document.getElementById('output').textContent = fullHtml;
    });
  </script>

</body>
</html>
