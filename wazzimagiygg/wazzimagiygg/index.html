<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cripto Mobile</title>
    <script src="https://uwg.wdfiles.com/local--files/ferramentauniversal/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #334155;
            margin: 20px 0 8px 0;
            padding-left: 4px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        textarea, input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: #f8fafc;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            outline: none;
            -webkit-appearance: none;
        }

        textarea:focus, input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            line-height: 1.5;
        }

        input[type="password"] {
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
            -webkit-appearance: none;
        }

        button:active {
            background: #2563eb;
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(59,130,246,0.4);
        }

        textarea[readonly] {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
            font-family: monospace;
            font-size: 14px;
        }

        /* Ajustes para iOS */
        @supports (-webkit-touch-callout: none) {
            textarea, input, button {
                font-size: 16px;
            }
        }

        /* Pequenos ajustes para telas muito pequenas */
        @media (max-width: 360px) {
            .container {
                padding: 16px 12px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            textarea, input, button {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Cripto Mobile</h1>
        
        <div class="section-title">📝 Criptografar</div>
        <textarea id="plainText" placeholder="Digite o texto..."></textarea>
        <input type="password" id="encryptPassword" placeholder="Senha" autocomplete="off">
        <button onclick="encryptText()">Criptografar</button>
        <textarea id="encryptedText" readonly placeholder="Texto criptografado aparecerá aqui" onclick="this.select()"></textarea>

        <div class="section-title">🔓 Descriptografar</div>
        <textarea id="cipherText" placeholder="Cole o texto criptografado..."></textarea>
        <input type="password" id="decryptPassword" placeholder="Senha" autocomplete="off">
        <button onclick="decryptText()">Descriptografar</button>
        <textarea id="decryptedText" readonly placeholder="Texto descriptografado aparecerá aqui" onclick="this.select()"></textarea>
    </div>

    <script>
        function encryptText() {
            const plainText = document.getElementById('plainText').value.trim();
            const password = document.getElementById('encryptPassword').value;
            const encryptedTextArea = document.getElementById('encryptedText');

            if (!plainText) {
                alert('📝 Digite um texto para criptografar');
                document.getElementById('plainText').focus();
                return;
            }

            if (!password) {
                alert('🔑 Digite uma senha');
                document.getElementById('encryptPassword').focus();
                return;
            }

            try {
                const encrypted = CryptoJS.AES.encrypt(plainText, password).toString();
                encryptedTextArea.value = encrypted;
                
                // Feedback visual
                encryptedTextArea.style.backgroundColor = '#f0fdf4';
                encryptedTextArea.style.borderColor = '#86efac';
                setTimeout(() => {
                    encryptedTextArea.style.backgroundColor = '';
                    encryptedTextArea.style.borderColor = '';
                }, 300);
            } catch (error) {
                alert('Erro ao criptografar. Tente novamente.');
                console.error(error);
            }
        }

        function decryptText() {
            const cipherText = document.getElementById('cipherText').value.trim();
            const password = document.getElementById('decryptPassword').value;
            const decryptedTextArea = document.getElementById('decryptedText');

            if (!cipherText) {
                alert('🔐 Cole o texto criptografado');
                document.getElementById('cipherText').focus();
                return;
            }

            if (!password) {
                alert('🔑 Digite a senha');
                document.getElementById('decryptPassword').focus();
                return;
            }

            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, password);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!decryptedText) {
                    decryptedTextArea.value = '';
                    throw new Error('Senha incorreta ou texto inválido');
                }

                decryptedTextArea.value = decryptedText;
                
                // Feedback visual
                decryptedTextArea.style.backgroundColor = '#f0fdf4';
                decryptedTextArea.style.borderColor = '#86efac';
                setTimeout(() => {
                    decryptedTextArea.style.backgroundColor = '';
                    decryptedTextArea.style.borderColor = '';
                }, 300);

            } catch (e) {
                decryptedTextArea.value = '';
                alert('❌ Falha na descriptografia. Verifique a senha e o texto.');
                
                // Feedback visual de erro
                decryptedTextArea.style.backgroundColor = '#fef2f2';
                decryptedTextArea.style.borderColor = '#fecaca';
                setTimeout(() => {
                    decryptedTextArea.style.backgroundColor = '';
                    decryptedTextArea.style.borderColor = '';
                }, 300);
            }
        }

        // Melhorias de UX mobile
        document.addEventListener('touchstart', function(){}, {passive: true});

        // Auto-select em campos readonly ao tocar
        const readonlyFields = document.querySelectorAll('textarea[readonly]');
        readonlyFields.forEach(field => {
            field.addEventListener('focus', function() {
                this.select();
            });
        });

        // Prevenir zoom ao focar em inputs no iOS
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.fontSize = '16px';
            });
        });
    </script>
</body>
</html>
