<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dividir e Manipular Arquivos</title>
    <style>
        .progress-container {
            width: 100%;
            background: #f3f3f3;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 10px;
        }
        .progress-bar {
            height: 20px;
            width: 0;
            background: #4caf50;
            text-align: center;
            color: white;
            line-height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Dividir e Manipular Arquivos</h1>

    <h2>Dividir Arquivo</h2>
    <input type="file" id="inputFile" />
    <button onclick="splitFile()">Dividir</button>
    <div class="progress-container" id="splitProgressContainer">
        <div class="progress-bar" id="splitProgressBar">0%</div>
    </div>

    <h2>Importar Arquivo ZIP</h2>
    <input type="file" id="importFile" accept=".zip" />
    <button onclick="importZip()">Importar</button>
    <div class="progress-container" id="importProgressContainer">
        <div class="progress-bar" id="importProgressBar">0%</div>
    </div>

    <h2>Download do TXT</h2>
    <button onclick="downloadTXT()">Download TXT</button>
    <div class="progress-container" id="txtProgressContainer">
        <div class="progress-bar" id="txtProgressBar">0%</div>
    </div>


    <script src="scripter.js"></script>
</body>
</html>
