<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Central de Ferramentas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: #64748b;
            font-weight: 400;
        }

        .tools-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .tool-card:active {
            transform: scale(0.98);
        }

        .tool-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .tool-info {
            flex: 1;
        }

        .tool-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .tool-description {
            font-size: 14px;
            color: #64748b;
            line-height: 1.4;
        }

        .tool-arrow {
            color: #94a3b8;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-arrow {
            transform: translateX(5px);
            color: #667eea;
        }

        /* Cores diferentes para cada card */
        .tool-card:nth-child(1) .tool-icon { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .tool-card:nth-child(2) .tool-icon { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .tool-card:nth-child(3) .tool-icon { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .tool-card:nth-child(4) .tool-icon { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .tool-card:nth-child(5) .tool-icon { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
        .tool-card:nth-child(6) .tool-icon { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); }
        .tool-card:nth-child(7) .tool-icon { background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%); }
        .tool-card:nth-child(8) .tool-icon { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }

        /* Footer */
        .footer {
            margin-top: 24px;
            text-align: center;
            padding-top: 16px;
            border-top: 2px dashed #e2e8f0;
            color: #64748b;
            font-size: 14px;
        }

        /* Loading state */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsividade */
        @media (max-width: 380px) {
            .container {
                padding: 16px 12px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .tool-card {
                padding: 12px;
            }
            
            .tool-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            
            .tool-name {
                font-size: 16px;
            }
            
            .tool-description {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Central de Ferramentas</h1>
            <div class="subtitle">Selecione uma ferramenta para começar</div>
        </div>

        <div class="tools-grid" id="toolsGrid">
            <!-- Os cards serão carregados via JavaScript -->
        </div>

        <div class="footer">
            <span id="footerMessage">⚡ Clique em qualquer ferramenta para abrir</span>
        </div>
    </div>

    <script>
        // Lista de ferramentas
        const tools = [
            {
                name: "Ferramenta Universal",
                description: "Criptografia e descriptografia de textos",
                icon: "🔐",
                file: "ferramentauniversal.html",
                color: "#3b82f6"
            },
            {
                name: "Bloco de Notas",
                description: "Anotações rápidas e organizadas",
                icon: "📝",
                file: "blocodenotas.html",
                color: "#10b981"
            },
            {
                name: "Gerador de FAQ",
                description: "Crie perguntas frequentes facilmente",
                icon: "❓",
                file: "Geradorfaq.html",
                color: "#f59e0b"
            },
            {
                name: "Notas",
                description: "Gerenciador de notas avançado",
                icon: "📌",
                file: "notas.html",
                color: "#ef4444"
            },
            {
                name: "ZIP JSON",
                description: "Compacte e descompacte JSON",
                icon: "🗜️",
                file: "zipjson.html",
                color: "#8b5cf6"
            },
            {
                name: "Visualizador JSON",
                description: "Visualize JSON de forma organizada",
                icon: "👁️",
                file: "visualizadordejsoncomum.html",
                color: "#ec4899"
            },
            {
                name: "JSON Criptografado",
                description: "Visualize JSON com criptografia",
                icon: "🔒",
                file: "visualizadordejsoncriptografado.html",
                color: "#14b8a6"
            },
            {
                name: "Serial Compiler",
                description: "Compilador e analisador serial",
                icon: "⚙️",
                file: "serialcompiler.html",
                color: "#f97316"
            }
        ];

        // Função para verificar se o arquivo existe
        async function checkFileExists(file) {
            try {
                const response = await fetch(file, { method: 'HEAD' });
                return response.ok;
            } catch {
                return false;
            }
        }

        // Função para criar os cards
        async function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const footerMessage = document.getElementById('footerMessage');
            
            // Mostrar loading
            footerMessage.innerHTML = 'Verificando ferramentas <span class="loading"></span>';
            
            let toolsHtml = '';
            
            for (const tool of tools) {
                const exists = await checkFileExists(tool.file);
                
                toolsHtml += `
                    <a href="${tool.file}" class="tool-card" style="opacity: ${exists ? 1 : 0.6};">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="tool-info">
                            <div class="tool-name">${tool.name}</div>
                            <div class="tool-description">${tool.description}</div>
                        </div>
                        <div class="tool-arrow">→</div>
                    </a>
                `;
            }
            
            grid.innerHTML = toolsHtml;
            footerMessage.innerHTML = '⚡ Clique em qualquer ferramenta para abrir';
            
            // Adicionar tratamento de erro para links quebrados
            document.querySelectorAll('.tool-card').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    
                    // Verificar se o arquivo existe antes de navegar
                    fetch(href, { method: 'HEAD' })
                        .then(response => {
                            if (!response.ok) {
                                e.preventDefault();
                                alert(`❌ Arquivo "${href}" não encontrado no diretório atual.`);
                            }
                        })
                        .catch(() => {
                            e.preventDefault();
                            alert(`❌ Erro ao acessar "${href}". Verifique se o arquivo existe.`);
                        });
                });
            });
        }

        // Iniciar renderização
        renderTools();

        // Adicionar suporte a tema escuro do sistema
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.style.background = 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)';
        }

        // Melhorias de toque mobile
        document.addEventListener('touchstart', function(){}, {passive: true});

        // Mostrar indicador de toque
        const cards = document.querySelectorAll('.tool-card');
        cards.forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.backgroundColor = '#f8fafc';
            });
            card.addEventListener('touchend', function() {
                this.style.backgroundColor = '';
            });
        });
    </script>
</body>
</html>
