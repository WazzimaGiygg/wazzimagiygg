<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Texto Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button, textarea {
            display: block;
            margin-top: 10px;
        }
        textarea {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Editor de Texto Simples</h1>
    </header>
    <main>
        <label for="loadExtension">Extensão de Carregamento (ex: .txt):</label>
        <input type="text" id="loadExtension" value=".html" />

        <label for="saveExtension">Extensão de Salvamento (ex: .txt):</label>
        <input type="text" id="saveExtension" value=".html" />

        <input type="file" id="fileInput" />
        <button onclick="loadFile()">Carregar</button>
        <button onclick="saveFile()">Salvar</button>
        <textarea id="editor" placeholder="Digite seu texto aqui..."></textarea>
    </main>
    <script>
        function loadFile() {
            const fileInput = document.getElementById('fileInput');
            const loadExtension = document.getElementById('loadExtension').value.trim();

            if (!fileInput.files.length) {
                alert('Por favor, selecione um arquivo para carregar.');
                return;
            }

            const file = fileInput.files[0];
            const fileExtension = file.name.slice(((file.name.lastIndexOf(".") - 1) >>> 0) + 2);

            if (!file.name.endsWith(loadExtension)) {
                alert(`Por favor, selecione um arquivo com a extensão ${loadExtension}`);
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('editor').value = event.target.result;
            };
            reader.readAsText(file);
        }

        function saveFile() {
            const saveExtension = document.getElementById('saveExtension').value.trim();
            const text = document.getElementById('editor').value;

            if (!text) {
                alert('Não há texto para salvar.');
                return;
            }

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${saveExtension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
