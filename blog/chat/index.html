<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Web - WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="login-container" class="login-container">
        <div class="login-card">
            <div class="login-logo-wrapper">
                <i class="fas fa-comment-dots login-icon"></i>
            </div>
            <h1>Chat Web</h1>
            <p>Conecte-se com seus amigos em tempo real</p>
            <button id="login-btn" class="login-btn">
                <i class="fab fa-google"></i>
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- CHAT PRINCIPAL -->
    <div id="chat-container" class="chat-container" style="display: none;">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <div>
                        <span id="user-name" class="user-name">Carregando...</span>
                        <span id="user-status" class="user-status">online</span>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button id="new-chat-btn" class="icon-btn" title="Novo Chat">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Pesquisar conversas">
            </div>

            <div id="chat-list" class="chat-list">
                <!-- Chats serão carregados aqui -->
                <div class="loading-chats">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando conversas...</p>
                </div>
            </div>
        </div>

        <!-- ÁREA DO CHAT -->
        <div class="chat-area">
            <!-- Header do Chat -->
            <div id="chat-header" class="chat-header" style="display: none;">
                <div class="chat-user-info">
                    <img id="chat-user-avatar" class="chat-user-avatar" src="" alt="Avatar">
                    <div>
                        <span id="chat-user-name" class="chat-user-name">Usuário</span>
                        <span id="chat-user-status" class="chat-user-status">Online</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" title="Chamada de voz"><i class="fas fa-phone"></i></button>
                    <button class="icon-btn" title="Chamada de vídeo"><i class="fas fa-video"></i></button>
                    <button class="icon-btn" title="Mais opções"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>

            <!-- Container de Mensagens -->
            <div id="messages-container" class="messages-container">
                <div id="messages" class="messages">
                    <!-- Mensagens serão carregadas aqui -->
                </div>
            </div>

            <!-- Input do Chat -->
            <div id="chat-input-container" class="chat-input-container" style="display: none;">
                <button class="icon-btn" title="Emojis"><i class="fas fa-smile"></i></button>
                <button class="icon-btn" title="Anexar"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="message-input" placeholder="Digite uma mensagem" class="message-input">
                <button id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <!-- Tela Vazia -->
            <div id="empty-chat" class="empty-chat">
                <i class="fas fa-comment-dots" style="font-size: 60px; color: #ccc;"></i>
                <h3>Selecione uma conversa</h3>
                <p>Escolha um chat para começar a conversar</p>
                <button id="start-new-chat-btn" class="start-chat-btn">
                    <i class="fas fa-plus"></i>
                    Nova conversa
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL NOVO CHAT -->
    <div id="new-chat-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> Novo Chat</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-users-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-users" placeholder="Pesquisar por nome ou e-mail" class="modal-input">
                </div>
                <div id="users-list" class="users-list">
                    <div class="loading-users">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Carregando usuários...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
