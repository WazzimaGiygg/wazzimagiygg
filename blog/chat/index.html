<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Tela de Login -->
    <div id="login-container" class="login-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/1200px-WhatsApp.svg.png" alt="Logo" class="login-logo">
            <h1>Chat Web</h1>
            <p>Conecte-se com seus amigos</p>
            <button id="login-btn" class="login-btn">
                <i class="fab fa-google"></i>
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- Chat Principal -->
    <div id="chat-container" class="chat-container" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <span id="user-name" class="user-name">Usuário</span>
                </div>
                <div class="sidebar-actions">
                    <button id="new-chat-btn" class="icon-btn" title="Novo Chat">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Pesquisar ou iniciar novo chat">
            </div>

            <div id="chat-list" class="chat-list">
                <!-- Lista de chats será carregada aqui -->
            </div>
        </div>

        <!-- Área do Chat -->
        <div class="chat-area">
            <div id="chat-header" class="chat-header" style="display: none;">
                <div class="chat-user-info">
                    <img id="chat-user-avatar" class="chat-user-avatar" src="" alt="Avatar">
                    <div>
                        <span id="chat-user-name" class="chat-user-name">Usuário</span>
                        <span id="chat-user-status" class="chat-user-status">Online</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn"><i class="fas fa-phone"></i></button>
                    <button class="icon-btn"><i class="fas fa-video"></i></button>
                    <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>

            <div id="messages-container" class="messages-container">
                <div id="messages" class="messages">
                    <!-- Mensagens serão carregadas aqui -->
                </div>
            </div>

            <div id="chat-input-container" class="chat-input-container" style="display: none;">
                <button class="icon-btn"><i class="fas fa-smile"></i></button>
                <button class="icon-btn"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="message-input" placeholder="Digite uma mensagem" class="message-input">
                <button id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div id="empty-chat" class="empty-chat">
                <i class="fas fa-comment-dots" style="font-size: 50px; color: #ccc;"></i>
                <h3>Selecione um chat</h3>
                <p>Escolha uma conversa para começar</p>
            </div>
        </div>
    </div>

    <!-- Modal Novo Chat -->
    <div id="new-chat-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Novo Chat</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="search-users" placeholder="Pesquisar usuários por nome ou email" class="modal-input">
                <div id="users-list" class="users-list">
                    <!-- Usuários serão listados aqui -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
