<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WikiWorldWeb - Gerenciador de Postagens</title>
    <link rel="stylesheet" href="style.css" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-globe"></i>
                <span>WikiWorldWeb</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active" data-section="posts">
                    <i class="fas fa-newspaper"></i>
                    <span>Postagens</span>
                </a>
                <a href="#" data-section="settings">
                    <i class="fas fa-cog"></i>
                    <span>Configurações</span>
                </a>
                <a href="#" data-section="media">
                    <i class="fas fa-images"></i>
                    <span>Mídia</span>
                </a>
                <a href="#" data-section="analytics">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
            </nav>
            <div class="user-info">
                <div class="avatar">A</div>
                <div class="user-details">
                    <span class="name">Admin</span>
                    <span class="email">admin@wikiworldweb.com</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <button id="sidebarToggle" class="toggle-btn">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Gerenciador de Postagens</h1>
                <div class="header-actions">
                    <button id="newPostBtn" class="btn-primary">
                        <i class="fas fa-plus"></i>
                        Nova Postagem
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <section class="content-area">
                <!-- Posts List -->
                <div id="postsSection" class="section active">
                    <div class="filters">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input
                                type="text"
                                id="searchInput"
                                placeholder="Buscar postagens..."
                            />
                        </div>
                        <div class="filter-options">
                            <select id="statusFilter">
                                <option value="all">Todos</option>
                                <option value="published">Publicados</option>
                                <option value="draft">Rascunhos</option>
                                <option value="scheduled">Agendados</option>
                            </select>
                            <select id="categoryFilter">
                                <option value="all">Todas categorias</option>
                            </select>
                        </div>
                    </div>

                    <div id="postsContainer" class="posts-grid">
                        <!-- Posts will be rendered here -->
                    </div>
                </div>

                <!-- Settings Section -->
                <div id="settingsSection" class="section">
                    <div class="settings-container">
                        <h2>Configurações do Site</h2>
                        <div class="settings-form">
                            <div class="form-group">
                                <label for="siteTitle">Título do Site</label>
                                <input type="text" id="siteTitle" value="WikiWorldWeb" />
                            </div>
                            <div class="form-group">
                                <label for="siteDescription">Descrição</label>
                                <textarea id="siteDescription" rows="3">
                                    Explore o conhecimento do mundo
                                </textarea>
                            </div>
                            <div class="form-group">
                                <label for="siteLogo">URL do Logo</label>
                                <input type="text" id="siteLogo" value="/assets/logo.png" />
                            </div>
                            <button id="saveSettingsBtn" class="btn-primary">
                                <i class="fas fa-save"></i>
                                Salvar Configurações
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Media Section -->
                <div id="mediaSection" class="section">
                    <div class="media-container">
                        <h2>Biblioteca de Mídia</h2>
                        <div class="media-grid" id="mediaGrid">
                            <!-- Media items will be rendered here -->
                        </div>
                        <div class="media-upload">
                            <input type="file" id="mediaUpload" accept="image/*" multiple />
                            <label for="mediaUpload" class="upload-btn">
                                <i class="fas fa-cloud-upload-alt"></i>
                                Upload de Imagens
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Analytics Section -->
                <div id="analyticsSection" class="section">
                    <div class="analytics-container">
                        <h2>Estatísticas</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <i class="fas fa-file-alt"></i>
                                <div class="stat-info">
                                    <span class="stat-label">Total de Postagens</span>
                                    <span class="stat-value" id="totalPosts">0</span>
                                </div>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-eye"></i>
                                <div class="stat-info">
                                    <span class="stat-label">Visualizações</span>
                                    <span class="stat-value" id="totalViews">0</span>
                                </div>
                            </div>
                            <div class="stat-card">
                                <i class="fas fa-users"></i>
                                <div class="stat-info">
                                    <span class="stat-label">Comentários</span>
                                    <span class="stat-value" id="totalComments">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for New/Edit Post -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nova Postagem</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="postForm">
                    <input type="hidden" id="postId" />
                    <div class="form-group">
                        <label for="postTitle">Título</label>
                        <input type="text" id="postTitle" required />
                    </div>
                    <div class="form-group">
                        <label for="postCategory">Categoria</label>
                        <input type="text" id="postCategory" placeholder="Ex: Tecnologia" />
                    </div>
                    <div class="form-group">
                        <label for="postContent">Conteúdo</label>
                        <textarea id="postContent" rows="8" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="postImage">URL da Imagem</label>
                        <input type="text" id="postImage" placeholder="URL da imagem de destaque" />
                    </div>
                    <div class="form-group">
                        <label for="postStatus">Status</label>
                        <select id="postStatus">
                            <option value="draft">Rascunho</option>
                            <option value="published">Publicado</option>
                            <option value="scheduled">Agendado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="postDate">Data de Publicação</label>
                        <input type="datetime-local" id="postDate" />
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelModal">Cancelar</button>
                <button class="btn-primary" id="savePostBtn">
                    <i class="fas fa-save"></i>
                    Salvar Postagem
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
