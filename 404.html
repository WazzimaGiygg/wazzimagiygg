<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Página não encontrada!</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #2b1e0f;
            padding: 20px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            background-color: #f9eed7;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            gap: 15px;
            flex-wrap: wrap;
            background: #3e2a1f;
            padding: 12px 20px;
            border-radius: 60px;
        }

        .status {
            background: #1f1a10;
            padding: 8px 20px;
            border-radius: 40px;
            color: #f7e05e;
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 0 #5a3e1a;
            box-shadow: inset 0 1px 3px #00000055, 0 2px 3px rgba(0,0,0,0.3);
        }

        .status span {
            color: #ffd966;
            font-size: 1.5rem;
        }

        button {
            background: #d4af37;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 8px 24px;
            border-radius: 40px;
            color: #2c1a0c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #7a5300;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a5300;
        }

        .controls-guide {
            display: flex;
            gap: 12px;
            background: #2f2419;
            padding: 5px 18px;
            border-radius: 40px;
            color: #ecd69e;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .controls-guide i {
            font-style: normal;
            background: #1e160e;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .touch-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .touch-buttons button {
            font-size: 2rem;
            padding: 10px 25px;
            background: #e6c384;
            box-shadow: 0 4px 0 #8b6946;
        }

        @media (max-width: 550px) {
            .info-panel { justify-content: center; }
            .controls-guide { order: 3; margin-top: 5px; }
            .status { font-size: 1rem; }
            button { padding: 6px 18px; }
            .touch-buttons button { font-size: 1.5rem; padding: 6px 18px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="mazeCanvas" width="550" height="550"></canvas>
        <div class="info-panel">
            <div class="status">🏆 <span id="messageText">Aventure-se!</span></div>
            <button id="resetBtn">🌀 NOVO LABIRINTO</button>
            <div class="controls-guide">
                <i>⬆️ ⬇️ ⬅️ ➡️</i> <span style="margin-left:6px">| WASD</span>
            </div>
        </div>
    </div>
    <div class="touch-buttons" id="touchControls"></div>
    <div style="text-align: center; margin-top: 15px; font-size: 13px; color: #c9b07b; font-weight: bold;">
        🌿 Início (⭐) ➔ Saída (🏁) | TODO caminho é acessível!
    </div>
</div>

<script>
    (function(){
        // CONFIGURAÇÕES
        const SIZE = 21; // Ímpar para labirinto perfeito
        let CELL_SIZE = 26;
        
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const messageSpan = document.getElementById('messageText');
        
        // Estado do jogo
        let gameWalls = [];
        let gamePlayerPos = { x: 0, y: 0 };
        let gameGoalPos = { x: 0, y: 0 };
        let gameStartPos = { x: 0, y: 0 };
        let gameActive = true;
        let redirectTriggered = false; // Evitar múltiplos redirecionamentos
        
        function resizeCanvas() {
            const containerSize = Math.min(window.innerWidth - 80, 600);
            canvas.width = containerSize;
            canvas.height = containerSize;
            canvas.style.width = `${containerSize}px`;
            canvas.style.height = `${containerSize}px`;
            CELL_SIZE = Math.floor(containerSize / SIZE);
        }
        
        // Algoritmo de Prim para gerar labirinto PERFEITAMENTE CONECTADO
        function generateConnectedMaze() {
            // Inicializar grid todo como parede
            let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(true));
            
            // Escolher posições aleatórias para início e fim
            let startX = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
            let startY = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
            let goalX = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
            let goalY = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
            
            // Garantir que início e fim não sejam o mesmo
            while(startX === goalX && startY === goalY) {
                goalX = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
                goalY = 1 + Math.floor(Math.random() * ((SIZE-2)/2)) * 2;
            }
            
            // Algoritmo de Prim para gerar labirinto
            for(let i = 0; i < SIZE; i++) {
                for(let j = 0; j < SIZE; j++) {
                    if(i % 2 === 1 && j % 2 === 1) {
                        grid[i][j] = false;
                    }
                }
            }
            
            let walls = [];
            let visited = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
            visited[startY][startX] = true;
            
            const addWalls = (x, y) => {
                const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
                for(let [dx, dy] of dirs) {
                    let nx = x + dx;
                    let ny = y + dy;
                    if(nx > 0 && nx < SIZE-1 && ny > 0 && ny < SIZE-1 && !visited[ny][nx]) {
                        let wallX = x + dx/2;
                        let wallY = y + dy/2;
                        walls.push({x: wallX, y: wallY, nextX: nx, nextY: ny});
                    }
                }
            };
            
            addWalls(startX, startY);
            
            while(walls.length > 0) {
                let randomIndex = Math.floor(Math.random() * walls.length);
                let wall = walls[randomIndex];
                walls.splice(randomIndex, 1);
                
                let nx = wall.nextX;
                let ny = wall.nextY;
                
                if(!visited[ny][nx]) {
                    grid[wall.y][wall.x] = false;
                    visited[ny][nx] = true;
                    addWalls(nx, ny);
                }
            }
            
            grid[startY][startX] = false;
            grid[goalY][goalX] = false;
            
            // Verificar e garantir caminho entre início e fim
            function hasPathToGoal(start, goal, gridMap) {
                let queue = [{x: start.x, y: start.y}];
                let visitedPath = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
                visitedPath[start.y][start.x] = true;
                
                while(queue.length > 0) {
                    let current = queue.shift();
                    if(current.x === goal.x && current.y === goal.y) return true;
                    
                    const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
                    for(let [dx, dy] of neighbors) {
                        let nx = current.x + dx;
                        let ny = current.y + dy;
                        if(nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && 
                           !visitedPath[ny][nx] && !gridMap[ny][nx]) {
                            visitedPath[ny][nx] = true;
                            queue.push({x: nx, y: ny});
                        }
                    }
                }
                return false;
            }
            
            if(!hasPathToGoal({x: startX, y: startY}, {x: goalX, y: goalY}, grid)) {
                let pathQueue = [{x: startX, y: startY}];
                let cameFrom = new Map();
                let visitedPath = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
                visitedPath[startY][startX] = true;
                
                while(pathQueue.length > 0) {
                    let current = pathQueue.shift();
                    if(current.x === goalX && current.y === goalY) break;
                    
                    const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
                    for(let [dx, dy] of neighbors) {
                        let nx = current.x + dx;
                        let ny = current.y + dy;
                        if(nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !visitedPath[ny][nx]) {
                            visitedPath[ny][nx] = true;
                            pathQueue.push({x: nx, y: ny});
                            cameFrom.set(`${nx},${ny}`, current);
                        }
                    }
                }
                
                let current = {x: goalX, y: goalY};
                while(current && !(current.x === startX && current.y === startY)) {
                    let prev = cameFrom.get(`${current.x},${current.y}`);
                    if(prev) {
                        let wallX = (current.x + prev.x) / 2;
                        let wallY = (current.y + prev.y) / 2;
                        if(wallX >= 0 && wallX < SIZE && wallY >= 0 && wallY < SIZE) {
                            grid[wallY][wallX] = false;
                        }
                        grid[current.y][current.x] = false;
                        current = prev;
                    } else {
                        break;
                    }
                }
            }
            
            // Bordas externas como paredes
            for(let i = 0; i < SIZE; i++) {
                grid[0][i] = true;
                grid[SIZE-1][i] = true;
                grid[i][0] = true;
                grid[i][SIZE-1] = true;
            }
            
            grid[startY][startX] = false;
            grid[goalY][goalX] = false;
            
            return {
                walls: grid,
                start: { x: startX, y: startY },
                goal: { x: goalX, y: goalY }
            };
        }
        
        // Desenhar o labirinto
        function drawMaze() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let row = 0; row < SIZE; row++) {
                for(let col = 0; col < SIZE; col++) {
                    let x = col * CELL_SIZE;
                    let y = row * CELL_SIZE;
                    
                    if(gameWalls[row] && gameWalls[row][col] === true) {
                        ctx.fillStyle = "#5d3a1a";
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.fillStyle = "#8b5a2b";
                        ctx.fillRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
                        ctx.fillStyle = "#c28a40";
                        if((col+row) % 3 === 0) {
                            ctx.fillRect(x+4, y+4, CELL_SIZE-8, 2);
                        }
                    } else {
                        let grad = ctx.createLinearGradient(x, y, x+CELL_SIZE, y+CELL_SIZE);
                        grad.addColorStop(0, "#ebd5b3");
                        grad.addColorStop(1, "#ddc494");
                        ctx.fillStyle = grad;
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
            
            ctx.font = `${Math.floor(CELL_SIZE * 0.7)}px "Segoe UI"`;
            ctx.fillStyle = "#ffb347";
            ctx.shadowBlur = 3;
            ctx.shadowColor = "black";
            ctx.fillText("⭐", gameStartPos.x * CELL_SIZE + CELL_SIZE*0.2, 
                        gameStartPos.y * CELL_SIZE + CELL_SIZE*0.8);
            
            ctx.fillStyle = "#e34234";
            ctx.fillText("🏁", gameGoalPos.x * CELL_SIZE + CELL_SIZE*0.2, 
                        gameGoalPos.y * CELL_SIZE + CELL_SIZE*0.8);
            
            let px = gamePlayerPos.x * CELL_SIZE;
            let py = gamePlayerPos.y * CELL_SIZE;
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, CELL_SIZE*0.3, 0, Math.PI*2);
            ctx.fillStyle = "#4d9eff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, CELL_SIZE*0.2, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.fillStyle = "#0f2b3d";
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE*0.4, py + CELL_SIZE*0.4, CELL_SIZE*0.06, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px + CELL_SIZE*0.6, py + CELL_SIZE*0.4, CELL_SIZE*0.06, 0, Math.PI*2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        // Função de redirecionamento
        function redirectToWebsite() {
            if(redirectTriggered) return;
            redirectTriggered = true;
            
            // URL alvo do redirecionamento
            const targetUrl = "https://search.wazzimagiygg.com/";
            
            // Exibir mensagem de redirecionamento
            messageSpan.innerHTML = "🎉 VITÓRIA! 🎉 Redirecionando...";
            
            // Pequeno delay para mostrar a mensagem de vitória
            setTimeout(() => {
                // Redirecionar para a página especificada
                window.location.href = targetUrl;
            }, 1500);
        }
        
        // Reiniciar o jogo com novo labirinto
        function resetGame() {
            const mazeData = generateConnectedMaze();
            gameWalls = mazeData.walls;
            gamePlayerPos = { x: mazeData.start.x, y: mazeData.start.y };
            gameGoalPos = { x: mazeData.goal.x, y: mazeData.goal.y };
            gameStartPos = { x: mazeData.start.x, y: mazeData.start.y };
            gameActive = true;
            redirectTriggered = false; // Resetar flag de redirecionamento
            messageSpan.innerText = "✨ Novo labirinto!";
            drawMaze();
            setTimeout(() => {
                if(gameActive && messageSpan.innerText !== "🎉 VITÓRIA! 🎉 Redirecionando...") {
                    messageSpan.innerText = "Encontre a bandeira 🏁";
                }
            }, 1500);
        }
        
        // Movimento do jogador
        function movePlayer(dx, dy) {
            if(!gameActive) return false;
            
            const newX = gamePlayerPos.x + dx;
            const newY = gamePlayerPos.y + dy;
            
            if(newX < 0 || newX >= SIZE || newY < 0 || newY >= SIZE) return false;
            if(gameWalls[newY][newX] === true) return false;
            
            gamePlayerPos.x = newX;
            gamePlayerPos.y = newY;
            drawMaze();
            
            if(gamePlayerPos.x === gameGoalPos.x && gamePlayerPos.y === gameGoalPos.y) {
                gameActive = false;
                redirectToWebsite(); // Chamar função de redirecionamento
                return true;
            }
            return true;
        }
        
        // Controle por teclado
        function onKeyDown(e) {
            const key = e.key;
            let dx = 0, dy = 0;
            
            if(key === 'ArrowUp' || key === 'w' || key === 'W') dy = -1;
            else if(key === 'ArrowDown' || key === 's' || key === 'S') dy = 1;
            else if(key === 'ArrowLeft' || key === 'a' || key === 'A') dx = -1;
            else if(key === 'ArrowRight' || key === 'd' || key === 'D') dx = 1;
            else return;
            
            e.preventDefault();
            movePlayer(dx, dy);
        }
        
        // Criar controles touch
        function setupTouchControls() {
            const container = document.getElementById('touchControls');
            const buttons = [
                { label: '⬆️', dx: 0, dy: -1 },
                { label: '⬇️', dx: 0, dy: 1 },
                { label: '⬅️', dx: -1, dy: 0 },
                { label: '➡️', dx: 1, dy: 0 }
            ];
            
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.textContent = btn.label;
                button.onclick = (e) => {
                    e.preventDefault();
                    movePlayer(btn.dx, btn.dy);
                };
                button.ontouchstart = (e) => {
                    e.preventDefault();
                    movePlayer(btn.dx, btn.dy);
                };
                container.appendChild(button);
            });
        }
        
        // Inicialização
        function init() {
            resizeCanvas();
            resetGame();
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                drawMaze();
            });
            
            window.addEventListener('keydown', onKeyDown);
            document.getElementById('resetBtn').addEventListener('click', () => {
                resetGame();
            });
            
            setupTouchControls();
            
            window.addEventListener('keydown', function(e) {
                const arrows = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
                if(arrows.includes(e.key)) {
                    e.preventDefault();
                }
            });
        }
        
        init();
    })();
</script>
</body>
</html>
