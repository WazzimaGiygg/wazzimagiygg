<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGPD - Solicitar Exclusão de Dados | WazzimaGiygg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: white; font-size: 2.5em; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .header p { color: rgba(255,255,255,0.9); margin-top: 15px; }
        .badge-lgpd { display: inline-block; background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 50px; font-size: 0.9em; margin-top: 15px; }
        .form-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .form-title { font-size: 1.5em; color: #2d3748; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .form-subtitle { color: #718096; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #2d3748; }
        .form-group label .required { color: #e53e3e; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-size: 15px; transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .info-box { background: #ebf8ff; border-left: 4px solid #3182ce; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; overflow: hidden; }
        .info-box .material-icons { float: left; margin-right: 12px; color: #3182ce; }
        .info-box p { margin-left: 28px; color: #2c5282; font-size: 14px; }
        .warning-box { background: #fff5f5; border-left: 4px solid #e53e3e; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; overflow: hidden; }
        .warning-box .material-icons { float: left; margin-right: 12px; color: #e53e3e; }
        .warning-box p { margin-left: 28px; color: #c53030; font-size: 14px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin: 20px 0; }
        .checkbox-group input { width: 20px; height: 20px; margin-top: 2px; }
        .btn-submit {
            width: 100%; background: linear-gradient(135deg, #e53e3e, #c53030); color: white;
            border: none; padding: 14px 24px; border-radius: 12px; font-size: 16px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(229,62,62,0.3); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .rights-section { margin-top: 30px; padding: 20px; background: #f7fafc; border-radius: 16px; }
        .rights-section h3 { font-size: 1.1em; color: #2d3748; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .rights-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .right-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #4a5568; }
        .right-item .material-icons { font-size: 16px; color: #48bb78; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; border-radius: 20px; max-width: 500px; width: 90%; padding: 30px; text-align: center; }
        .modal-content .material-icons { font-size: 64px; margin-bottom: 20px; }
        .modal-content .success-icon { color: #48bb78; }
        .modal-content .error-icon { color: #e53e3e; }
        .modal-content h3 { margin-bottom: 15px; color: #2d3748; }
        .modal-content p { color: #718096; margin-bottom: 20px; }
        .modal-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 24px; border-radius: 50px; cursor: pointer; }
        .protocol-code { background: #f0f0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 18px; letter-spacing: 2px; margin: 15px 0; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 1100; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .login-container { max-width: 500px; margin: 100px auto; background: white; border-radius: 24px; padding: 50px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .login-container h2 { color: #2d3748; margin-bottom: 20px; }
        .login-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 14px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; }
        .user-info { display: flex; align-items: center; justify-content: space-between; background: #f7fafc; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { background: #e53e3e; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        @media (max-width: 640px) { .form-card { padding: 25px; } .header h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // EmailJS
        const EMAILJS_CONFIG = {
            PUBLIC_KEY: 'KB_xBv3-83G8qMGlw',
            SERVICE_ID: 'service_wxt3tt9',
            TEMPLATE_ID: 'template_svo2mrf'
        };
        
        if (typeof emailjs !== 'undefined') {
            emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
        }

        let currentUser = null;

        function showToast(message, isError) {
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#e53e3e' : '#48bb78';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 4000);
        }

        function generateProtocol() {
            var date = new Date();
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            var random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return 'WZZM-LGPD-' + year + month + day + '-' + hours + minutes + '-' + random;
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enviar e-mail para o DPO
        async function sendEmailNotification(requestData, protocol) {
            if (typeof emailjs === 'undefined') {
                console.log('EmailJS não disponível');
                return { success: false };
            }
            var templateParams = {
                to_email: 'dpo@wazzimagiygg.com',
                from_name: requestData.userName,
                from_email: currentUser.email,
                subject: '[LGPD] Solicitação de Exclusão de Dados - ' + protocol,
                protocol: protocol,
                request_type: 'Exclusão de Dados (LGPD Art. 18)',
                law: 'LGPD - Lei Geral de Proteção de Dados',
                message: 'Protocolo: ' + protocol + '\n' +
                         'Nome: ' + requestData.userName + '\n' +
                         'Email: ' + currentUser.email + '\n' +
                         'UID: ' + currentUser.uid + '\n' +
                         'Motivo: ' + (requestData.reason || 'Não informado') + '\n' +
                         'Observações: ' + (requestData.comments || 'Nenhuma'),
                reply_to: currentUser.email,
                created_at: new Date().toLocaleString('pt-BR')
            };
            try {
                await emailjs.send(EMAILJS_CONFIG.SERVICE_ID, EMAILJS_CONFIG.TEMPLATE_ID, templateParams);
                console.log('✅ E-mail enviado para dpo@wazzimagiygg.com');
                return { success: true };
            } catch (error) {
                console.error('Erro no EmailJS:', error);
                return { success: false };
            }
        }

        // Salvar no Firestore
        async function saveToFirestore(requestData) {
            try {
                const docRef = await db.collection('deletion_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: currentUser.displayName || currentUser.email.split('@')[0],
                    status: 'pending',
                    requestDate: firebase.firestore.FieldValue.serverTimestamp(),
                    source: 'web_form',
                    protocol: requestData.protocol,
                    reason: requestData.reason,
                    comments: requestData.comments,
                    requestType: 'deletion'
                });
                console.log('✅ Salvo no Firestore com ID:', docRef.id);
                return { success: true, id: docRef.id };
            } catch (error) {
                console.error('❌ Erro no Firestore:', error.message);
                return { success: false, error: error.message };
            }
        }

        // Salvar no localStorage (fallback)
        function saveToLocalStorage(requestData) {
            try {
                var key = 'wzzm_deletion_requests_' + currentUser.uid;
                var existing = localStorage.getItem(key);
                var requests = existing ? JSON.parse(existing) : [];
                requests.push({
                    id: Date.now().toString(),
                    userName: currentUser.displayName || currentUser.email.split('@')[0],
                    userEmail: currentUser.email,
                    userId: currentUser.uid,
                    status: 'pending',
                    requestDate: new Date().toISOString(),
                    protocol: requestData.protocol,
                    reason: requestData.reason,
                    comments: requestData.comments,
                    source: 'localStorage_fallback'
                });
                localStorage.setItem(key, JSON.stringify(requests));
                console.log('✅ Salvo no localStorage como fallback');
                return { success: true };
            } catch (error) {
                console.error('Erro no localStorage:', error);
                return { success: false };
            }
        }

        // Submeter solicitação
        async function submitDeletionRequest(event) {
            event.preventDefault();
            
            var reasonSelect = document.getElementById('reason');
            var commentsText = document.getElementById('comments');
            var confirmCheckbox = document.getElementById('confirm-lgpd');
            
            var reason = reasonSelect ? reasonSelect.value : '';
            var comments = commentsText ? commentsText.value.trim() : '';
            var confirmLgpd = confirmCheckbox ? confirmCheckbox.checked : false;
            
            if (!confirmLgpd) {
                showToast('❌ Você precisa confirmar que é o titular dos dados', true);
                return;
            }
            
            var protocol = generateProtocol();
            var submitBtn = document.getElementById('submit-btn');
            
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading-spinner"></span> Enviando solicitação...';
            }
            
            var requestData = {
                protocol: protocol,
                reason: reason || null,
                comments: comments || null,
                userName: currentUser.displayName || currentUser.email.split('@')[0]
            };
            
            try {
                // 1. Tentar salvar no Firestore primeiro
                var firestoreResult = await saveToFirestore(requestData);
                
                var savedToCloud = firestoreResult.success;
                
                // 2. Se falhou no Firestore, salvar no localStorage
                if (!savedToCloud) {
                    console.log('Firestore falhou, salvando localmente...');
                    saveToLocalStorage(requestData);
                    showToast('⚠️ Solicitação salva localmente (modo offline). O admin será notificado por e-mail.', true);
                } else {
                    showToast('✅ Solicitação salva na nuvem com sucesso!');
                }
                
                // 3. Enviar e-mail (sempre tenta)
                await sendEmailNotification(requestData, protocol);
                
                // 4. Mostrar modal de sucesso
                var modal = document.getElementById('success-modal');
                var protocolSpan = document.getElementById('success-protocol');
                if (protocolSpan) protocolSpan.textContent = protocol;
                if (modal) modal.style.display = 'flex';
                
                // 5. Limpar formulário
                if (reasonSelect) reasonSelect.value = '';
                if (commentsText) commentsText.value = '';
                if (confirmCheckbox) confirmCheckbox.checked = false;
                
            } catch (error) {
                console.error('Erro:', error);
                showToast('❌ Erro ao enviar solicitação: ' + error.message, true);
            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span class="material-icons">delete_forever</span> Solicitar Exclusão Permanente';
                }
            }
        }

        // Renderizar Dashboard do Usuário
        function renderUserDashboard() {
            var app = document.getElementById('app');
            var userName = currentUser.displayName || currentUser.email.split('@')[0];
            var userInitial = userName.charAt(0).toUpperCase();
            
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">delete_forever</span> Solicitar Exclusão de Dados - LGPD</h1>
                        <p>Nos termos da Lei 13.709/2018 - Direito ao Esquecimento</p>
                        <div class="badge-lgpd"><span class="material-icons" style="font-size: 14px;">verified</span> Seus dados, seu controle</div>
                    </div>
                    
                    <div class="form-card">
                        <div class="user-info">
                            <div class="user-avatar">${escapeHtml(userInitial)}</div>
                            <div><strong>${escapeHtml(userName)}</strong><br>${escapeHtml(currentUser.email)}</div>
                            <button class="logout-btn" onclick="window.logout()">Sair</button>
                        </div>
                        
                        <div class="form-title"><span class="material-icons">assignment</span> Nova Solicitação de Exclusão</div>
                        <div class="form-subtitle">Preencha os dados abaixo para solicitar a exclusão permanente de suas informações.</div>
                        
                        <div class="info-box">
                            <span class="material-icons">info</span>
                            <p><strong>Prazo de resposta:</strong> Até 15 dias úteis, conforme estabelecido pela LGPD.</p>
                        </div>
                        
                        <div class="warning-box">
                            <span class="material-icons">warning</span>
                            <p><strong>Atenção:</strong> A exclusão é irreversível! Todos os seus dados serão permanentemente removidos.</p>
                        </div>
                        
                        <form id="deletion-form">
                            <div class="form-group">
                                <label>Motivo da Solicitação</label>
                                <select id="reason">
                                    <option value="">Selecione uma opção...</option>
                                    <option value="Não utilizo mais a plataforma">Não utilizo mais a plataforma</option>
                                    <option value="Preocupações com privacidade">Preocupações com privacidade</option>
                                    <option value="Dados incorretos">Dados incorretos ou desatualizados</option>
                                    <option value="Revogação de consentimento">Revogação de consentimento</option>
                                    <option value="Outro motivo">Outro motivo</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Observações adicionais</label>
                                <textarea id="comments" placeholder="Informe qualquer detalhe relevante sobre sua solicitação..."></textarea>
                            </div>
                            
                            <div class="checkbox-group">
                                <input type="checkbox" id="confirm-lgpd">
                                <label>Confirmo que sou o titular dos dados e estou ciente de que a exclusão é irreversível, conforme previsto no <strong>Art. 18 da LGPD</strong>.</label>
                            </div>
                            
                            <button type="submit" class="btn-submit" id="submit-btn">
                                <span class="material-icons">delete_forever</span> Solicitar Exclusão Permanente
                            </button>
                        </form>
                        
                        <div class="rights-section">
                            <h3><span class="material-icons">gavel</span> Seus direitos garantidos pela LGPD:</h3>
                            <div class="rights-list">
                                <div class="right-item"><span class="material-icons">check_circle</span> Confirmação da existência de tratamento</div>
                                <div class="right-item"><span class="material-icons">check_circle</span> Acesso aos dados pessoais</div>
                                <div class="right-item"><span class="material-icons">check_circle</span> Correção de dados incompletos</div>
                                <div class="right-item"><span class="material-icons">check_circle</span> Portabilidade dos dados</div>
                                <div class="right-item"><span class="material-icons">check_circle</span> Eliminação de dados desnecessários</div>
                                <div class="right-item"><span class="material-icons">check_circle</span> Revogação do consentimento</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="success-modal" class="modal">
                    <div class="modal-content">
                        <span class="material-icons success-icon">check_circle</span>
                        <h3>Solicitação Enviada com Sucesso!</h3>
                        <p>Sua solicitação de exclusão de dados foi recebida pela nossa equipe de compliance.</p>
                        <div class="protocol-code" id="success-protocol">WZZM-LGPD-XXXX</div>
                        <p><strong>Prazo de resposta: 15 dias úteis</strong></p>
                        <button class="modal-btn" onclick="window.closeModal()">OK, entendi</button>
                    </div>
                </div>
            `;
            
            var form = document.getElementById('deletion-form');
            if (form) form.addEventListener('submit', submitDeletionRequest);
        }

        function renderLogin() {
            var app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-container">
                    <span class="material-icons" style="font-size: 64px; color: #667eea;">delete_forever</span>
                    <h2>Solicitar Exclusão de Dados - LGPD</h2>
                    <p>Para solicitar a exclusão dos seus dados, faça login com sua conta Google.</p>
                    <p style="font-size: 12px; margin-top: 10px;">Seus dados serão tratados conforme a Lei 13.709/2018 (LGPD)</p>
                    <button class="login-btn" onclick="window.login()">
                        <span class="material-icons">login</span> Entrar com Google
                    </button>
                </div>
            `;
        }

        window.login = function() {
            auth.signInWithPopup(googleProvider).catch(function(error) {
                showToast('❌ Erro: ' + error.message, true);
            });
        };

        window.logout = function() {
            auth.signOut().then(function() {
                showToast('✅ Logout realizado');
                renderLogin();
            });
        };

        window.closeModal = function() {
            var modal = document.getElementById('success-modal');
            if (modal) modal.style.display = 'none';
        };

        auth.onAuthStateChanged(function(user) {
            currentUser = user;
            if (user) {
                renderUserDashboard();
            } else {
                renderLogin();
            }
        });
    </script>
</body>
</html>
