<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - WikiZero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header h1 { color: #333; font-size: 24px; }
        .stats { display: flex; gap: 20px; }
        .stat-card { background: #f8f9fa; padding: 10px 20px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }
        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group { flex: 1; min-width: 180px; }
        .filter-group label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-refresh {
            background: #667eea; color: white; border: none; padding: 8px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .btn-refresh:hover { background: #5a67d8; }
        .btn-logout { background: #dc3545; }
        .btn-logout:hover { background: #c82333; }
        .table-container { background: white; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #e9ecef; }
        td { padding: 15px; border-bottom: 1px solid #e9ecef; vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        .status {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #cfe2ff; color: #084298; }
        .status-completed { background: #d1e7dd; color: #0f5132; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; margin: 0 3px; }
        .btn-process { background: #28a745; color: white; }
        .btn-process:hover { background: #218838; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-reject:hover { background: #c82333; }
        .btn-view { background: #17a2b8; color: white; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; border-radius: 12px; max-width: 600px;
            width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 20px; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 10px; }
        .user-detail { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .alert { padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; animation: slideIn 0.3s ease; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .login-required {
            text-align: center; padding: 60px 20px; background: white;
            border-radius: 12px; max-width: 500px; margin: 100px auto;
        }
        .login-btn {
            background: #667eea; color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px;
        }
        .admin-info { background: #e8f0fe; padding: 10px 15px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
        .warning-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
            .btn-action { padding: 4px 8px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="main-container"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let allRequests = [];
        let currentRequestId = null;
        let isAdminUser = false;

        // UIDs específicos que são administradores (da função isSpecificAdmin)
        const SPECIFIC_ADMIN_UIDS = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1'];

        function showAlert(message, type) {
            let alertContainer = document.getElementById('alert-container');
            if (!alertContainer) {
                const container = document.querySelector('.container');
                if (container) {
                    alertContainer = document.createElement('div');
                    alertContainer.id = 'alert-container';
                    container.insertBefore(alertContainer, container.firstChild);
                } else return;
            }
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Verificar se o usuário é admin (de acordo com as regras do Firebase)
        async function checkIsAdmin(user) {
            if (!user) return false;
            
            // Verifica se é admin específico por UID
            if (SPECIFIC_ADMIN_UIDS.includes(user.uid)) {
                return true;
            }
            
            // Verifica se tem documento na coleção users com isAdmin == true
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().isAdmin === true) {
                    return true;
                }
            } catch (error) {
                console.warn('Erro ao verificar admin:', error);
            }
            
            return false;
        }

        function renderAdminPanel() {
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="container">
                    <div class="header">
                        <div>
                            <h1>📋 Painel Administrativo - Pedidos de Exclusão (LGPD)</h1>
                            <div class="admin-info">
                                ✅ Logado: <strong>${currentUser?.email}</strong> | UID: ${currentUser?.uid.substring(0, 20)}...
                                ${isAdminUser ? '<span style="color:#28a745; margin-left:10px;">✓ Admin verificado</span>' : '<span style="color:#dc3545; margin-left:10px;">⚠️ Sem permissões de admin</span>'}
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-card"><div class="stat-number" id="total-pending">0</div><div class="stat-label">Pendentes</div></div>
                            <div class="stat-card"><div class="stat-number" id="total-processing">0</div><div class="stat-label">Processando</div></div>
                            <div class="stat-card"><div class="stat-number" id="total-completed">0</div><div class="stat-label">Concluídos</div></div>
                            <div class="stat-card"><div class="stat-number" id="total-rejected">0</div><div class="stat-label">Rejeitados</div></div>
                        </div>
                    </div>
                    <div id="alert-container"></div>
                    <div class="filters">
                        <div class="filter-group"><label>📊 Status</label><select id="filter-status"><option value="all">Todos</option><option value="pending">Pendentes</option><option value="processing">Processando</option><option value="completed">Concluídos</option><option value="rejected">Rejeitados</option></select></div>
                        <div class="filter-group"><label>🔍 Buscar</label><input type="text" id="search-input" placeholder="Email ou UID"></div>
                        <div class="filter-group"><label>📅 Data inicial</label><input type="date" id="date-start"></div>
                        <div class="filter-group"><label>📅 Data final</label><input type="date" id="date-end"></div>
                        <button class="btn-refresh" onclick="loadRequests()">🔄 Atualizar</button>
                        <button class="btn-refresh btn-logout" onclick="signOut()">🚪 Sair</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Usuário</th><th>Email</th><th>UID</th><th>Data do Pedido</th><th>Status</th><th>Ações</th></tr>
                            </thead>
                            <tbody id="table-body"><tr><td colspan="6" class="loading">📚 Carregando pedidos...</td></tr></tbody>
                        </table>
                    </div>
                </div>
                <div id="detail-modal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📄 Detalhes do Pedido</h3><span class="close-modal" onclick="closeModal()">&times;</span></div><div class="modal-body" id="modal-body"></div><div class="modal-footer"><button class="btn-action btn-process" id="modal-process-btn" onclick="processFromModal()">✅ Processar Exclusão</button><button class="btn-action btn-reject" id="modal-reject-btn" onclick="rejectFromModal()">❌ Rejeitar</button><button class="btn-action" onclick="closeModal()">Fechar</button></div></div></div>
                <div id="confirm-modal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="confirm-title">Confirmar ação</h3><span class="close-modal" onclick="closeConfirmModal()">&times;</span></div><div class="modal-body" id="confirm-body"></div><div class="modal-footer"><button class="btn-action" id="confirm-yes" style="background:#28a745">Sim, confirmar</button><button class="btn-action" onclick="closeConfirmModal()">Cancelar</button></div></div></div>
            `;
            
            document.getElementById('filter-status')?.addEventListener('change', () => applyFilters());
            document.getElementById('search-input')?.addEventListener('input', () => applyFilters());
            document.getElementById('date-start')?.addEventListener('change', () => applyFilters());
            document.getElementById('date-end')?.addEventListener('change', () => applyFilters());
        }

        function renderLoginScreen() {
            document.getElementById('main-container').innerHTML = `
                <div class="login-required">
                    <h2>🔐 Área Administrativa</h2>
                    <p>Faça login com uma conta de administrador para acessar este painel.</p>
                    <p style="font-size:12px;color:#666;margin-top:10px">UIDs autorizados: ${SPECIFIC_ADMIN_UIDS.join(', ')}</p>
                    <button class="login-btn" onclick="signIn()">🔑 Login com Google</button>
                </div>
            `;
        }

        function renderAccessDenied() {
            document.getElementById('main-container').innerHTML = `
                <div class="login-required">
                    <h2>⛔ Acesso Negado</h2>
                    <p>Seu email <strong>${currentUser?.email}</strong> não tem permissões de administrador.</p>
                    <div class="warning-box">
                        <strong>⚠️ Para se tornar administrador:</strong><br>
                        1. Abra o console (F12)<br>
                        2. Execute o comando para criar o documento de admin:<br>
                        <code style="display:block; margin-top:10px; padding:10px; background:#f8f9fa; font-size:11px;">
                        await firebase.firestore().collection('users').doc('${currentUser?.uid}').set({ isAdmin: true, email: '${currentUser?.email}' });
                        </code>
                        3. Recarregue a página
                    </div>
                    <button class="login-btn" onclick="signOut()">Sair e tentar outra conta</button>
                </div>
            `;
        }

        // Carregar pedidos de exclusão
        async function loadRequests() {
            const tbody = document.getElementById('table-body');
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="6" class="loading">📚 Carregando pedidos...</td></tr>';
            
            try {
                // Usar a coleção deletion_requests (já configurada nas regras)
                const snapshot = await db.collection('deletion_requests')
                    .orderBy('requestDate', 'desc')
                    .get();
                
                allRequests = [];
                snapshot.forEach(doc => {
                    allRequests.push({
                        id: doc.id,
                        ...doc.data(),
                        requestDate: doc.data().requestDate?.toDate() || new Date()
                    });
                });
                
                updateStats();
                applyFilters();
                
                if (allRequests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="loading">📭 Nenhum pedido de exclusão encontrado</td></tr>';
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
                tbody.innerHTML = `<tr><td colspan="6" class="loading" style="color:#d33">❌ Erro: ${error.message}</td></tr>`;
                
                if (error.code === 'permission-denied') {
                    showAlert('⚠️ Sem permissão para ler pedidos. Verifique se você é administrador.', 'error');
                }
            }
        }

        function updateStats() {
            const pending = allRequests.filter(r => r.status === 'pending').length;
            const processing = allRequests.filter(r => r.status === 'processing').length;
            const completed = allRequests.filter(r => r.status === 'completed').length;
            const rejected = allRequests.filter(r => r.status === 'rejected').length;
            
            document.getElementById('total-pending') && (document.getElementById('total-pending').textContent = pending);
            document.getElementById('total-processing') && (document.getElementById('total-processing').textContent = processing);
            document.getElementById('total-completed') && (document.getElementById('total-completed').textContent = completed);
            document.getElementById('total-rejected') && (document.getElementById('total-rejected').textContent = rejected);
        }

        function applyFilters() {
            const status = document.getElementById('filter-status')?.value || 'all';
            const search = document.getElementById('search-input')?.value.toLowerCase() || '';
            const dateStart = document.getElementById('date-start')?.value;
            const dateEnd = document.getElementById('date-end')?.value;
            
            let filtered = [...allRequests];
            
            if (status !== 'all') filtered = filtered.filter(r => r.status === status);
            if (search) filtered = filtered.filter(r => r.userEmail?.toLowerCase().includes(search) || r.userId?.toLowerCase().includes(search));
            if (dateStart) filtered = filtered.filter(r => r.requestDate >= new Date(dateStart));
            if (dateEnd) {
                const end = new Date(dateEnd);
                end.setHours(23, 59, 59);
                filtered = filtered.filter(r => r.requestDate <= end);
            }
            
            displayRequests(filtered);
        }

        function displayRequests(requests) {
            const tbody = document.getElementById('table-body');
            if (!tbody) return;
            
            if (requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">📭 Nenhum pedido encontrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = requests.map(req => `
                <tr>
                    <td><strong>${escapeHtml(req.userName || 'N/A')}</strong><br><small>${req.id.substring(0,8)}...</small></td>
                    <td>${escapeHtml(req.userEmail || 'N/A')}</td>
                    <td><code style="font-size:11px;">${escapeHtml(req.userId?.substring(0,20))}...</code></td>
                    <td>${formatDate(req.requestDate)}</td>
                    <td>${getStatusBadge(req.status)}</td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewDetails('${req.id}')">👁️ Detalhes</button>
                        ${req.status === 'pending' ? `
                            <button class="btn-action btn-process" onclick="processRequest('${req.id}')">✅ Processar</button>
                            <button class="btn-action btn-reject" onclick="rejectRequest('${req.id}')">❌ Rejeitar</button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function viewDetails(id) {
            const request = allRequests.find(r => r.id === id);
            if (!request) return;
            currentRequestId = id;
            
            document.getElementById('modal-body').innerHTML = `
                <div class="user-detail">
                    <p><strong>👤 Nome:</strong> ${escapeHtml(request.userName || 'N/A')}</p>
                    <p><strong>📧 Email:</strong> ${escapeHtml(request.userEmail || 'N/A')}</p>
                    <p><strong>🆔 UID:</strong> <code>${escapeHtml(request.userId)}</code></p>
                    <p><strong>📅 Data do pedido:</strong> ${formatDate(request.requestDate)}</p>
                    <p><strong>📊 Status:</strong> ${getStatusBadge(request.status)}</p>
                    <p><strong>🔖 ID do Pedido:</strong> <code>${request.id}</code></p>
                </div>
                <div style="margin-top:20px;">
                    <h4>⚠️ O que será excluído:</h4>
                    <ul style="margin-left:20px; margin-top:10px;">
                        <li>Todas as páginas criadas pelo usuário (coleção /documentos)</li>
                        <li>Todos os artigos do usuário (subcoleção /inevitavel)</li>
                        <li>Histórico de edições (coleção /user_edits)</li>
                        <li>Logs de consentimento (coleção /consent_logs)</li>
                    </ul>
                </div>
            `;
            
            const processBtn = document.getElementById('modal-process-btn');
            const rejectBtn = document.getElementById('modal-reject-btn');
            if (processBtn && rejectBtn) {
                const show = request.status === 'pending';
                processBtn.style.display = show ? 'inline-block' : 'none';
                rejectBtn.style.display = show ? 'inline-block' : 'none';
            }
            
            document.getElementById('detail-modal').style.display = 'flex';
        }

        async function processRequest(id, bulk = false) {
            const request = allRequests.find(r => r.id === id);
            if (!request) return;
            
            showConfirmModal('⚠️ Confirmar Exclusão de Dados', `
                <p>Tem certeza que deseja <strong>EXCLUIR PERMANENTEMENTE</strong> os dados do usuário?</p>
                <div class="user-detail" style="margin-top:15px;">
                    <p><strong>Usuário:</strong> ${escapeHtml(request.userName || request.userEmail)}</p>
                    <p><strong>UID:</strong> <code>${escapeHtml(request.userId)}</code></p>
                </div>
                <p style="color:#dc3545; margin-top:15px;"><strong>⚠️ Esta ação é irreversível!</strong></p>
            `, async () => {
                try {
                    showAlert('🔄 Processando exclusão...', 'info');
                    let deletedCount = 0;
                    
                    // 1. Excluir páginas do usuário em /documentos
                    const userPages = await db.collection('documentos')
                        .where('criadoPor', '==', request.userId)
                        .get();
                    
                    for (const doc of userPages.docs) {
                        // Excluir subcoleção de artigos
                        const articles = await doc.ref.collection('inevitavel').get();
                        for (const article of articles.docs) {
                            await article.ref.delete();
                            deletedCount++;
                        }
                        await doc.ref.delete();
                        deletedCount++;
                    }
                    
                    // 2. Excluir histórico de edições
                    const edits = await db.collection('user_edits')
                        .where('userId', '==', request.userId)
                        .get();
                    
                    for (const edit of edits.docs) {
                        await edit.ref.delete();
                        deletedCount++;
                    }
                    
                    // 3. Excluir logs de consentimento
                    const consents = await db.collection('consent_logs')
                        .where('userId', '==', request.userId)
                        .get();
                    
                    for (const consent of consents.docs) {
                        await consent.ref.delete();
                        deletedCount++;
                    }
                    
                    // 4. Atualizar status do pedido
                    await db.collection('deletion_requests').doc(id).update({
                        status: 'completed',
                        processedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        processedBy: currentUser.email,
                        deletedItemsCount: deletedCount
                    });
                    
                    showAlert(`✅ Exclusão concluída! ${deletedCount} itens removidos.`, 'success');
                    await loadRequests();
                    closeModal();
                    if (!bulk) closeConfirmModal();
                    
                } catch (error) {
                    console.error('Erro na exclusão:', error);
                    showAlert(`❌ Erro: ${error.message}`, 'error');
                }
            });
        }

        async function rejectRequest(id, bulk = false) {
            showConfirmModal('❌ Rejeitar Pedido', '<p>Tem certeza que deseja rejeitar este pedido de exclusão?</p>', async () => {
                try {
                    await db.collection('deletion_requests').doc(id).update({
                        status: 'rejected',
                        rejectedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        rejectedBy: currentUser.email,
                        rejectionReason: 'Rejeitado pelo administrador'
                    });
                    
                    showAlert('✅ Pedido rejeitado!', 'success');
                    await loadRequests();
                    closeModal();
                    if (!bulk) closeConfirmModal();
                    
                } catch (error) {
                    showAlert(`❌ Erro: ${error.message}`, 'error');
                }
            });
        }

        function formatDate(date) { return date ? date.toLocaleString('pt-BR') : 'N/A'; }
        
        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="status status-pending">⏳ Pendente</span>',
                'processing': '<span class="status status-processing">🔄 Processando</span>',
                'completed': '<span class="status status-completed">✅ Concluído</span>',
                'rejected': '<span class="status status-rejected">❌ Rejeitado</span>'
            };
            return badges[status] || '<span class="status">❓ Desconhecido</span>';
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function showConfirmModal(title, body, onConfirm) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-body').innerHTML = body;
            document.getElementById('confirm-modal').style.display = 'flex';
            document.getElementById('confirm-yes').onclick = () => { onConfirm(); };
        }
        
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function processFromModal() { if (currentRequestId) processRequest(currentRequestId); }
        function rejectFromModal() { if (currentRequestId) rejectRequest(currentRequestId); }
        
        function signIn() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function signOut() { auth.signOut().then(() => location.reload()); }

        // Autenticação e verificação de admin
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            
            if (user) {
                isAdminUser = await checkIsAdmin(user);
                
                if (isAdminUser) {
                    renderAdminPanel();
                    await loadRequests();
                } else {
                    renderAccessDenied();
                }
            } else {
                renderLoginScreen();
            }
        });
    </script>
</body>
</html>
