<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Auditor - Admin | WikiZero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            color: #718096;
            margin-top: 8px;
        }

        .admin-info {
            background: #e8f0fe;
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #2d3748;
        }

        .stat-label {
            color: #718096;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Botões */
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        /* Filtros */
        .filters {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
        }

        /* Tabela de Coleções */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        tr:hover {
            background: #f8fafc;
        }

        .collection-row {
            cursor: pointer;
        }

        .collection-row.expanded {
            background: #e8f0fe;
        }

        .subcollection-row {
            background: #f9fafb;
        }

        .subcollection-row td {
            padding-left: 40px;
        }

        /* Barra de progresso de memória */
        .memory-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .memory-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Modal de Documentos */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }

        /* Documento Card */
        .doc-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .doc-id {
            font-family: monospace;
            font-size: 12px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .doc-data {
            font-family: monospace;
            font-size: 11px;
            background: #1a1a2e;
            color: #00ff88;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Conteúdo dinâmico -->
    </div>

    <!-- Modal de Documentos -->
    <div id="docs-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Documentos da Coleção</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="loading">Carregando documentos...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // ============================================
        // CONFIGURAÇÃO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentUser = null;
        let isAdmin = false;
        let allCollections = [];
        let expandedCollections = new Set();

        // UIDs de administradores
        const ADMIN_UIDS = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1', '6aPqWVh8JVYL5NqEb78iDGPD7dH3'];

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatNumber(num) {
            return num.toLocaleString('pt-BR');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkIsAdmin(user) {
            if (!user) return false;
            if (ADMIN_UIDS.includes(user.uid)) return true;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                return userDoc.exists && userDoc.data().isAdmin === true;
            } catch { return false; }
        }

        // ============================================
        // FUNÇÃO PRINCIPAL - LISTAR TODAS AS COLEÇÕES
        // ============================================
        
        async function scanAllCollections() {
            if (!isAdmin) return;
            
            showLoading();
            
            try {
                // Obter todas as coleções raiz
                const collectionsRef = await db.listCollections();
                
                const collectionsData = [];
                let totalDocs = 0;
                let totalSize = 0;
                
                for (const collectionRef of collectionsRef) {
                    const collectionId = collectionRef.id;
                    console.log(`📁 Escaneando coleção: ${collectionId}`);
                    
                    // Obter todos os documentos da coleção
                    const snapshot = await collectionRef.get();
                    const docCount = snapshot.size;
                    let collectionSize = 0;
                    const documents = [];
                    
                    for (const doc of snapshot.docs) {
                        // Calcular tamanho aproximado do documento
                        const docData = doc.data();
                        const docSize = JSON.stringify(docData).length;
                        collectionSize += docSize;
                        
                        documents.push({
                            id: doc.id,
                            data: docData,
                            size: docSize
                        });
                    }
                    
                    totalDocs += docCount;
                    totalSize += collectionSize;
                    
                    collectionsData.push({
                        id: collectionId,
                        docCount: docCount,
                        size: collectionSize,
                        documents: documents,
                        subcollections: []
                    });
                }
                
                // Após escanear coleções raiz, buscar subcoleções
                for (const collection of collectionsData) {
                    for (const doc of collection.documents) {
                        try {
                            const subcollections = await db.collection(collection.id).doc(doc.id).listCollections();
                            
                            for (const subCol of subcollections) {
                                const subColId = subCol.id;
                                const subSnapshot = await subCol.get();
                                const subDocCount = subSnapshot.size;
                                let subColSize = 0;
                                const subDocuments = [];
                                
                                for (const subDoc of subSnapshot.docs) {
                                    const subDocSize = JSON.stringify(subDoc.data()).length;
                                    subColSize += subDocSize;
                                    subDocuments.push({
                                        id: subDoc.id,
                                        data: subDoc.data(),
                                        size: subDocSize
                                    });
                                }
                                
                                collection.subcollections.push({
                                    id: subColId,
                                    parentDocId: doc.id,
                                    docCount: subDocCount,
                                    size: subColSize,
                                    documents: subDocuments
                                });
                                
                                totalDocs += subDocCount;
                                totalSize += subColSize;
                            }
                        } catch (e) {
                            console.warn(`Erro ao listar subcoleções de ${collection.id}/${doc.id}:`, e);
                        }
                    }
                }
                
                allCollections = collectionsData;
                
                renderDashboard(totalDocs, totalSize);
                
            } catch (error) {
                console.error('Erro ao escanear:', error);
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <div class="header">
                            <h1><span class="material-icons">error</span> Erro</h1>
                            <p>${escapeHtml(error.message)}</p>
                        </div>
                    </div>
                `;
            }
        }
        
        function showLoading() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">storage</span> Firestore Auditor</h1>
                        <p>Escaneando todas as coleções e calculando uso de memória...</p>
                        <div class="admin-info">
                            <span class="material-icons" style="font-size: 16px;">admin_panel_settings</span>
                            Administrador: <strong>${escapeHtml(currentUser?.displayName || currentUser?.email)}</strong>
                        </div>
                    </div>
                    <div class="loading">
                        <div class="spinner"></div>
                        <p style="margin-top: 20px;">🔍 Escaneando Firestore... Isso pode levar alguns segundos</p>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // RENDERIZAÇÃO DO DASHBOARD
        // ============================================
        
        function renderDashboard(totalDocs, totalSize) {
            const app = document.getElementById('app');
            
            // Calcular estatísticas
            const totalCollections = allCollections.length;
            const totalSubcollections = allCollections.reduce((sum, col) => sum + col.subcollections.length, 0);
            const topCollection = [...allCollections].sort((a, b) => b.size - a.size)[0];
            
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>
                            <span class="material-icons">storage</span>
                            Firestore Auditor - WikiZero
                        </h1>
                        <p>Visualize todas as coleções, subcoleções e o espaço ocupado por cada uma</p>
                        <div class="admin-info">
                            <div>
                                <span class="material-icons" style="font-size: 16px;">admin_panel_settings</span>
                                Administrador: <strong>${escapeHtml(currentUser?.displayName || currentUser?.email)}</strong>
                            </div>
                            <div>
                                <button class="btn-primary" onclick="refreshScan()">
                                    <span class="material-icons">refresh</span> Re-escanear
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Cards de Estatísticas -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalCollections)}</div>
                            <div class="stat-label">Coleções Raiz</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalSubcollections)}</div>
                            <div class="stat-label">Subcoleções</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalDocs)}</div>
                            <div class="stat-label">Total de Documentos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatBytes(totalSize)}</div>
                            <div class="stat-label">Espaço Total Ocupado</div>
                        </div>
                    </div>
                    
                    <!-- Filtros -->
                    <div class="filters">
                        <div class="filter-group">
                            <label>🔍 Buscar coleção</label>
                            <input type="text" id="search-collection" placeholder="Nome da coleção..." onkeyup="filterCollections()">
                        </div>
                        <div class="filter-group">
                            <label>📊 Ordenar por</label>
                            <select id="sort-by" onchange="filterCollections()">
                                <option value="name">Nome (A-Z)</option>
                                <option value="size">Tamanho (Maior p/ Menor)</option>
                                <option value="docs">Documentos (Mais p/ Menos)</option>
                            </select>
                        </div>
                        <button class="btn-secondary" onclick="exportToJSON()">
                            <span class="material-icons">download</span> Exportar JSON
                        </button>
                    </div>
                    
                    <!-- Tabela de Coleções -->
                    <div class="table-container">
                        <div class="table-header">
                            <h3><span class="material-icons">folder</span> Coleções do Firestore</h3>
                            <span style="font-size: 12px; color: #718096;">Clique em uma coleção para expandir/subcoleções</span>
                        </div>
                        <div style="overflow-x: auto;">
                            <table id="collections-table">
                                <thead>
                                    <tr>
                                        <th>Coleção</th>
                                        <th>Documentos</th>
                                        <th>Tamanho Estimado</th>
                                        <th>% do Total</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="collections-tbody">
                                    ${renderCollectionsList()}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="footer">
                        <p>WikiZero - Auditoria do Firestore | Dados calculados com base no JSON.stringify()</p>
                        <p>⚠️ O tamanho é uma estimativa aproximada, não reflete exatamente o custo do Firestore</p>
                    </div>
                </div>
            `;
        }
        
        function renderCollectionsList() {
            const searchTerm = document.getElementById('search-collection')?.value.toLowerCase() || '';
            const sortBy = document.getElementById('sort-by')?.value || 'name';
            
            let filtered = [...allCollections];
            
            if (searchTerm) {
                filtered = filtered.filter(col => col.id.toLowerCase().includes(searchTerm));
            }
            
            if (sortBy === 'name') {
                filtered.sort((a, b) => a.id.localeCompare(b.id));
            } else if (sortBy === 'size') {
                filtered.sort((a, b) => b.size - a.size);
            } else if (sortBy === 'docs') {
                filtered.sort((a, b) => b.docCount - a.docCount);
            }
            
            return filtered.map(col => {
                const percentage = (col.size / allCollections.reduce((sum, c) => sum + c.size, 0)) * 100;
                const isExpanded = expandedCollections.has(col.id);
                
                return `
                    ${renderCollectionRow(col, percentage, isExpanded)}
                    ${isExpanded ? renderSubcollections(col) : ''}
                `;
            }).join('');
        }
        
        function renderCollectionRow(col, percentage, isExpanded) {
            return `
                <tr class="collection-row" onclick="toggleCollection('${col.id}')">
                    <td>
                        <span class="material-icons" style="font-size: 18px; vertical-align: middle; color: #667eea;">
                            ${isExpanded ? 'folder_open' : 'folder'}
                        </span>
                        <strong style="margin-left: 8px;">${escapeHtml(col.id)}</strong>
                    </td>
                    <td>${formatNumber(col.docCount)}</td>
                    <td>
                        <strong>${formatBytes(col.size)}</strong>
                        <div class="memory-bar" style="margin-top: 5px;">
                            <div class="memory-fill" style="width: ${percentage}%"></div>
                        </div>
                    </td>
                    <td>${percentage.toFixed(2)}%</td>
                    <td>
                        <button class="btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="event.stopPropagation(); viewDocuments('${col.id}', 'root')">
                            📄 Ver Docs
                        </button>
                    </td>
                </tr>
            `;
        }
        
        function renderSubcollections(col) {
            if (col.subcollections.length === 0) {
                return `
                    <tr class="subcollection-row">
                        <td colspan="5" style="padding-left: 40px; color: #a0aec0;">
                            📭 Nenhuma subcoleção encontrada
                        </td>
                    </tr>
                `;
            }
            
            return col.subcollections.map(sub => {
                const subPercentage = (sub.size / allCollections.reduce((sum, c) => sum + c.size, 0)) * 100;
                return `
                    <tr class="subcollection-row">
                        <td style="padding-left: 40px;">
                            <span class="material-icons" style="font-size: 16px; vertical-align: middle; color: #764ba2;">subdirectory_arrow_right</span>
                            <span style="margin-left: 5px;">${escapeHtml(sub.id)}</span>
                            <span style="font-size: 11px; color: #999;"> (pai: ${escapeHtml(col.id)}/${escapeHtml(sub.parentDocId)})</span>
                        </td>
                        <td>${formatNumber(sub.docCount)}</td>
                        <td>
                            ${formatBytes(sub.size)}
                            <div class="memory-bar" style="margin-top: 5px;">
                                <div class="memory-fill" style="width: ${Math.min(subPercentage, 100)}%"></div>
                            </div>
                        </td>
                        <td>${subPercentage.toFixed(2)}%</td>
                        <td>
                            <button class="btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="event.stopPropagation(); viewDocuments('${col.id}/${sub.parentDocId}/${sub.id}', 'sub')">
                                📄 Ver Docs
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // ============================================
        // FUNÇÕES DE INTERAÇÃO
        // ============================================
        
        function toggleCollection(collectionId) {
            if (expandedCollections.has(collectionId)) {
                expandedCollections.delete(collectionId);
            } else {
                expandedCollections.add(collectionId);
            }
            filterCollections();
        }
        
        function filterCollections() {
            const tbody = document.getElementById('collections-tbody');
            if (tbody) {
                tbody.innerHTML = renderCollectionsList();
            }
        }
        
        async function viewDocuments(collectionPath, type) {
            const modal = document.getElementById('docs-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');
            
            modalTitle.innerHTML = `📄 Documentos: ${escapeHtml(collectionPath)}`;
            modalBody.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando documentos...</div>';
            modal.style.display = 'flex';
            
            try {
                let docs = [];
                
                if (type === 'root') {
                    // Coleção raiz
                    const snapshot = await db.collection(collectionPath).get();
                    docs = snapshot.docs.map(doc => ({
                        id: doc.id,
                        data: doc.data(),
                        size: JSON.stringify(doc.data()).length
                    }));
                } else {
                    // Subcoleção (formato: "colecao/docId/subcolecao")
                    const parts = collectionPath.split('/');
                    if (parts.length === 3) {
                        const snapshot = await db.collection(parts[0]).doc(parts[1]).collection(parts[2]).get();
                        docs = snapshot.docs.map(doc => ({
                            id: doc.id,
                            data: doc.data(),
                            size: JSON.stringify(doc.data()).length
                        }));
                    }
                }
                
                if (docs.length === 0) {
                    modalBody.innerHTML = '<div style="padding: 40px; text-align: center; color: #a0aec0;">📭 Nenhum documento encontrado</div>';
                    return;
                }
                
                modalBody.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <strong>${formatNumber(docs.length)} documentos</strong> | Total: ${formatBytes(docs.reduce((sum, d) => sum + d.size, 0))}
                    </div>
                    ${docs.map(doc => `
                        <div class="doc-card">
                            <div class="doc-id">
                                <span class="material-icons" style="font-size: 14px;">description</span>
                                ID: ${escapeHtml(doc.id)} (${formatBytes(doc.size)})
                            </div>
                            <div class="doc-data">
                                ${JSON.stringify(doc.data, null, 2)}
                            </div>
                        </div>
                    `).join('')}
                `;
                
            } catch (error) {
                modalBody.innerHTML = `<div style="color: #dc3545; padding: 20px;">❌ Erro: ${escapeHtml(error.message)}</div>`;
            }
        }
        
        function closeModal() {
            document.getElementById('docs-modal').style.display = 'none';
        }
        
        function exportToJSON() {
            const exportData = {
                exportDate: new Date().toISOString(),
                totalCollections: allCollections.length,
                totalSize: allCollections.reduce((sum, c) => sum + c.size, 0),
                collections: allCollections.map(col => ({
                    name: col.id,
                    documentCount: col.docCount,
                    sizeBytes: col.size,
                    sizeFormatted: formatBytes(col.size),
                    subcollections: col.subcollections.map(sub => ({
                        name: sub.id,
                        parentDocument: sub.parentDocId,
                        documentCount: sub.docCount,
                        sizeBytes: sub.size,
                        sizeFormatted: formatBytes(sub.size)
                    }))
                }))
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `firestore_audit_${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function refreshScan() {
            scanAllCollections();
        }
        
        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        
        function renderLoginScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">storage</span> Firestore Auditor</h1>
                        <p>Ferramenta administrativa para visualização do banco de dados</p>
                    </div>
                    <div style="background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;">
                        <span class="material-icons" style="font-size: 64px; color: #667eea;">admin_panel_settings</span>
                        <h2 style="margin: 20px 0;">Acesso Restrito</h2>
                        <p style="margin-bottom: 30px; color: #718096;">Faça login com uma conta de administrador</p>
                        <button class="btn-primary" onclick="signIn()" style="padding: 12px 30px;">
                            🔑 Entrar com Google
                        </button>
                    </div>
                </div>
            `;
        }
        
        function renderAccessDenied() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">lock</span> Acesso Negado</h1>
                        <p>Você não tem permissão para acessar esta ferramenta</p>
                    </div>
                    <div style="background: white; border-radius: 20px; padding: 40px; text-align: center;">
                        <span class="material-icons" style="font-size: 64px; color: #dc3545;">gpp_bad</span>
                        <h2>Área Administrativa</h2>
                        <p>Sua conta não possui privilégios de administrador.</p>
                        <button class="btn-primary" onclick="window.location.href='https://wiki.wazzimagiygg.com'" style="margin-top: 20px;">
                            Voltar para WikiZero
                        </button>
                    </div>
                </div>
            `;
        }
        
        function signIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }
        
        function logout() {
            auth.signOut().then(() => location.reload());
        }
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                isAdmin = await checkIsAdmin(user);
                if (isAdmin) {
                    await scanAllCollections();
                } else {
                    renderAccessDenied();
                }
            } else {
                renderLoginScreen();
            }
        });
        
        // Expor funções globalmente
        window.toggleCollection = toggleCollection;
        window.filterCollections = filterCollections;
        window.viewDocuments = viewDocuments;
        window.closeModal = closeModal;
        window.exportToJSON = exportToJSON;
        window.refreshScan = refreshScan;
        window.signIn = signIn;
        window.logout = logout;
    </script>
</body>
</html>
