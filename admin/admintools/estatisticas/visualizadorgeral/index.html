<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Explorer - Admin | WikiZero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            color: #718096;
            margin-top: 8px;
        }

        .admin-info {
            background: #e8f0fe;
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #2d3748;
        }

        .stat-label {
            color: #718096;
            font-size: 13px;
            margin-top: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .filters {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        tr:hover {
            background: #f8fafc;
        }

        .memory-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .memory-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }

        .doc-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .doc-id {
            font-family: monospace;
            font-size: 12px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .doc-data {
            font-family: monospace;
            font-size: 11px;
            background: #1a1a2e;
            color: #00ff88;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <!-- Modal de Documentos -->
    <div id="docs-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Documentos da Coleção</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="loading">Carregando documentos...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // ============================================
        // CONFIGURAÇÃO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // LISTA COMPLETA DE COLEÇÕES (baseada nas imagens)
        // ============================================
        const COLLECTIONS_TO_SCAN = [
            // Primeira imagem
            'Actions', 'Bemtevi', 'HTML2W', 'Kilometrosz', 'Tickets', 'WZPZM',
            'academico', 'admin', 'admincorewnpx', 'admins', 'admiticket', 'albumimagens',
            'ambulatorio', 'aplicativo', 'articles',
            
            // Segunda imagem
            'articlesdoc', 'associations', 'blocodenotas', 'buscadelistadepaginas',
            'calculadoradinamica', 'checkuser', 'cidadessancionadas', 'client',
            'clientEmails', 'clientPhones', 'cliente', 'clientepaciente', 'clients',
            'configuracoes', 'contatowazzimagiygg',
            
            // Terceira imagem
            'criptografar', 'dados_do_rodape', 'deletion_requests', 'denuncias',
            'desktop', 'docoffice', 'documentdata', 'documentuniversal', 'email',
            'emails', 'errorlog', 'espacowazzimagiygg', 'financialData', 'forum',
            'forumapplication',
            
            // Quarta imagem
            'forumwzzm', 'gemini_api_keys', 'gespai', 'historico', 'historicoEdicoes',
            'historicodecontribuicoes', 'historicogeral', 'imagenscode', 'index',
            'inevitavel', 'keymenulista', 'listasecundariah', 'logeral', 'manageruid',
            'materia',
            
            // Quinta imagem
            'materials', 'materias', 'menuconfig', 'minhapersona', 'news', 'officewzzm',
            'paginasUsuario', 'pdfcode', 'planilhadinamica', 'profissional',
            'prontuariodinamico', 'prontuariomultifuncionalformatado', 'prontuariouniversal',
            'redirecionamento',
            
            // Sexta imagem
            'relatoriosadmin', 'reports', 'rodapes_registrados', 'securityuid',
            'skyfemboy', 'skyfemboy1', 'skyfemboy2', 'social', 'testedeartgicontificio',
            'tickets', 'userEmails', 'user_desktop', 'user_edits', 'userpage', 'users',
            
            // Sétima imagem
            'userteacher', 'uwgbooks', 'wazzimagigggfemboyverse69', 'wikicodigo',
            'wikinotpedia', 'wikiworldweb', 'wikizero', 'wnpx', 'wwebmodmail'
        ];

        const ADMIN_UIDS = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1', '6aPqWVh8JVYL5NqEb78iDGPD7dH3'];

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentUser = null;
        let isAdmin = false;
        let allCollections = [];

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatNumber(num) {
            return num.toLocaleString('pt-BR');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkIsAdmin(user) {
            if (!user) return false;
            if (ADMIN_UIDS.includes(user.uid)) return true;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                return userDoc.exists && userDoc.data().isAdmin === true;
            } catch { return false; }
        }

        // ============================================
        // FUNÇÃO PRINCIPAL - ESCANEAR COLEÇÕES
        // ============================================
        
        async function scanAllCollections() {
            if (!isAdmin) return;
            
            showLoading();
            
            try {
                const collectionsData = [];
                let totalDocs = 0;
                let totalSize = 0;
                let processed = 0;
                
                for (const collectionName of COLLECTIONS_TO_SCAN) {
                    processed++;
                    console.log(`📁 [${processed}/${COLLECTIONS_TO_SCAN.length}] Escaneando: ${collectionName}`);
                    
                    try {
                        const snapshot = await db.collection(collectionName).get();
                        const docCount = snapshot.size;
                        let collectionSize = 0;
                        const documents = [];
                        
                        for (const doc of snapshot.docs) {
                            const docSize = JSON.stringify(doc.data()).length;
                            collectionSize += docSize;
                            documents.push({
                                id: doc.id,
                                data: doc.data(),
                                size: docSize
                            });
                        }
                        
                        totalDocs += docCount;
                        totalSize += collectionSize;
                        
                        collectionsData.push({
                            id: collectionName,
                            docCount: docCount,
                            size: collectionSize,
                            documents: documents
                        });
                        
                    } catch (error) {
                        console.warn(`⚠️ Erro ao acessar ${collectionName}:`, error.message);
                        collectionsData.push({
                            id: collectionName,
                            docCount: 0,
                            size: 0,
                            documents: [],
                            error: error.message
                        });
                    }
                    
                    // Atualizar progresso a cada 10 coleções
                    if (processed % 10 === 0) {
                        updateProgress(processed, COLLECTIONS_TO_SCAN.length);
                    }
                }
                
                allCollections = collectionsData;
                renderDashboard(totalDocs, totalSize);
                
            } catch (error) {
                console.error('Erro ao escanear:', error);
                showError(error.message);
            }
        }
        
        function updateProgress(current, total) {
            const progressDiv = document.getElementById('progress-text');
            if (progressDiv) {
                progressDiv.innerHTML = `🔍 Escaneando: ${current}/${total} coleções...`;
            }
        }
        
        function showLoading() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">storage</span> Firestore Explorer</h1>
                        <p>Escaneando todas as coleções do Firestore...</p>
                        <div class="admin-info">
                            <span class="material-icons">admin_panel_settings</span>
                            Administrador: <strong>${escapeHtml(currentUser?.displayName || currentUser?.email)}</strong>
                        </div>
                    </div>
                    <div class="loading">
                        <div class="spinner"></div>
                        <p id="progress-text" style="margin-top: 20px;">🔍 Escaneando coleções... (0/${COLLECTIONS_TO_SCAN.length})</p>
                        <p style="font-size: 12px; color: #718096; margin-top: 10px;">Isso pode levar alguns segundos</p>
                    </div>
                </div>
            `;
        }
        
        function showError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">error</span> Erro</h1>
                        <p>${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        
        function renderDashboard(totalDocs, totalSize) {
            const app = document.getElementById('app');
            
            const totalCollections = allCollections.length;
            const collectionsWithData = allCollections.filter(c => c.docCount > 0).length;
            
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>
                            <span class="material-icons">storage</span>
                            Firestore Explorer - WikiZero
                        </h1>
                        <p>Visualize todas as ${totalCollections} coleções do Firestore</p>
                        <div class="admin-info">
                            <div>
                                <span class="material-icons">admin_panel_settings</span>
                                Administrador: <strong>${escapeHtml(currentUser?.displayName || currentUser?.email)}</strong>
                            </div>
                            <div>
                                <button class="btn-primary" onclick="refreshScan()">
                                    <span class="material-icons">refresh</span> Re-escanear
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalCollections)}</div>
                            <div class="stat-label">Total de Coleções</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(collectionsWithData)}</div>
                            <div class="stat-label">Coleções com Dados</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatNumber(totalDocs)}</div>
                            <div class="stat-label">Total de Documentos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${formatBytes(totalSize)}</div>
                            <div class="stat-label">Espaço Total Estimado</div>
                        </div>
                    </div>
                    
                    <div class="filters">
                        <div class="filter-group">
                            <label>🔍 Buscar coleção</label>
                            <input type="text" id="search-collection" placeholder="Nome da coleção..." onkeyup="filterCollections()">
                        </div>
                        <div class="filter-group">
                            <label>📊 Ordenar por</label>
                            <select id="sort-by" onchange="filterCollections()">
                                <option value="name">Nome (A-Z)</option>
                                <option value="size">Tamanho (Maior p/ Menor)</option>
                                <option value="docs">Documentos (Mais p/ Menos)</option>
                            </select>
                        </div>
                        <button class="btn-secondary" onclick="exportToJSON()">
                            <span class="material-icons">download</span> Exportar JSON
                        </button>
                    </div>
                    
                    <div class="table-container">
                        <div class="table-header">
                            <h3><span class="material-icons">folder</span> Coleções do Firestore</h3>
                            <span style="font-size: 12px; color: #718096;">${totalCollections} coleções monitoradas</span>
                        </div>
                        <div style="overflow-x: auto;">
                            <table id="collections-table">
                                <thead>
                                    <tr>
                                        <th>Coleção</th>
                                        <th>Documentos</th>
                                        <th>Tamanho Estimado</th>
                                        <th>% do Total</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="collections-tbody">
                                    ${renderCollectionsList(totalSize)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="footer">
                        <p>WikiZero - Firestore Explorer | Dados calculados com base no JSON.stringify()</p>
                        <p>📊 Total de coleções escaneadas: ${totalCollections}</p>
                    </div>
                </div>
            `;
        }
        
        function renderCollectionsList(totalSize) {
            const searchTerm = document.getElementById('search-collection')?.value.toLowerCase() || '';
            const sortBy = document.getElementById('sort-by')?.value || 'name';
            
            let filtered = [...allCollections];
            
            if (searchTerm) {
                filtered = filtered.filter(col => col.id.toLowerCase().includes(searchTerm));
            }
            
            if (sortBy === 'name') {
                filtered.sort((a, b) => a.id.localeCompare(b.id));
            } else if (sortBy === 'size') {
                filtered.sort((a, b) => b.size - a.size);
            } else if (sortBy === 'docs') {
                filtered.sort((a, b) => b.docCount - a.docCount);
            }
            
            return filtered.map(col => {
                const percentage = totalSize > 0 ? (col.size / totalSize) * 100 : 0;
                const hasData = col.docCount > 0;
                
                return `
                    <tr>
                        <td>
                            <span class="material-icons" style="font-size: 18px; vertical-align: middle; color: ${hasData ? '#667eea' : '#a0aec0'};">${hasData ? 'folder' : 'folder_open'}</span>
                            <strong style="margin-left: 8px; ${!hasData ? 'color: #a0aec0;' : ''}">${escapeHtml(col.id)}</strong>
                            ${col.error ? `<span style="color: #dc3545; margin-left: 10px; font-size: 11px;">⚠️ ${escapeHtml(col.error)}</span>` : ''}
                            ${!hasData && !col.error ? `<span style="color: #a0aec0; margin-left: 10px; font-size: 11px;">📭 vazia</span>` : ''}
                        </td>
                        <td>${hasData ? formatNumber(col.docCount) : '0'}</td>
                        <td>
                            ${hasData ? `<strong>${formatBytes(col.size)}</strong>` : '—'}
                            ${hasData && percentage > 0 ? `
                                <div class="memory-bar">
                                    <div class="memory-fill" style="width: ${Math.min(percentage, 100)}%"></div>
                                </div>
                            ` : ''}
                        </td>
                        <td>${hasData ? percentage.toFixed(2) + '%' : '—'}</td>
                        <td>
                            ${hasData ? `
                                <button class="btn-secondary" style="padding: 4px 10px; font-size: 11px;" onclick="viewDocuments('${col.id}')">
                                    📄 Ver Docs
                                </button>
                            ` : '—'}
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // ============================================
        // FUNÇÕES DE INTERAÇÃO
        // ============================================
        
        function filterCollections() {
            const tbody = document.getElementById('collections-tbody');
            if (tbody) {
                const totalSize = allCollections.reduce((sum, c) => sum + c.size, 0);
                tbody.innerHTML = renderCollectionsList(totalSize);
            }
        }
        
        async function viewDocuments(collectionName) {
            const modal = document.getElementById('docs-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');
            
            modalTitle.innerHTML = `📄 Documentos: ${escapeHtml(collectionName)}`;
            modalBody.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando documentos...</div>';
            modal.style.display = 'flex';
            
            try {
                const snapshot = await db.collection(collectionName).get();
                const docs = snapshot.docs.map(doc => ({
                    id: doc.id,
                    data: doc.data(),
                    size: JSON.stringify(doc.data()).length
                }));
                
                if (docs.length === 0) {
                    modalBody.innerHTML = '<div style="padding: 40px; text-align: center; color: #a0aec0;">📭 Nenhum documento encontrado</div>';
                    return;
                }
                
                const totalSize = docs.reduce((sum, d) => sum + d.size, 0);
                
                modalBody.innerHTML = `
                    <div style="margin-bottom: 15px; padding: 10px; background: #f8fafc; border-radius: 8px;">
                        <strong>${formatNumber(docs.length)} documentos</strong> | Total: ${formatBytes(totalSize)}
                    </div>
                    ${docs.map(doc => `
                        <div class="doc-card">
                            <div class="doc-id">
                                <span class="material-icons" style="font-size: 14px;">description</span>
                                ID: ${escapeHtml(doc.id)} (${formatBytes(doc.size)})
                            </div>
                            <div class="doc-data">
                                ${JSON.stringify(doc.data, null, 2)}
                            </div>
                        </div>
                    `).join('')}
                `;
                
            } catch (error) {
                modalBody.innerHTML = `<div style="color: #dc3545; padding: 20px;">❌ Erro: ${escapeHtml(error.message)}</div>`;
            }
        }
        
        function closeModal() {
            document.getElementById('docs-modal').style.display = 'none';
        }
        
        function exportToJSON() {
            const exportData = {
                exportDate: new Date().toISOString(),
                totalCollections: allCollections.length,
                collectionsWithData: allCollections.filter(c => c.docCount > 0).length,
                totalSize: allCollections.reduce((sum, c) => sum + c.size, 0),
                collections: allCollections.map(col => ({
                    name: col.id,
                    documentCount: col.docCount,
                    sizeBytes: col.size,
                    sizeFormatted: formatBytes(col.size),
                    error: col.error || null
                }))
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `firestore_export_${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function refreshScan() {
            scanAllCollections();
        }
        
        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        
        function renderLoginScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">storage</span> Firestore Explorer</h1>
                        <p>Ferramenta administrativa para visualização do banco de dados</p>
                    </div>
                    <div style="background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;">
                        <span class="material-icons" style="font-size: 64px; color: #667eea;">admin_panel_settings</span>
                        <h2 style="margin: 20px 0;">Acesso Restrito</h2>
                        <p style="margin-bottom: 30px; color: #718096;">Faça login com uma conta de administrador</p>
                        <button class="btn-primary" onclick="signIn()" style="padding: 12px 30px;">
                            🔑 Entrar com Google
                        </button>
                    </div>
                </div>
            `;
        }
        
        function renderAccessDenied() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">lock</span> Acesso Negado</h1>
                        <p>Você não tem permissão para acessar esta ferramenta</p>
                    </div>
                    <div style="background: white; border-radius: 20px; padding: 40px; text-align: center;">
                        <span class="material-icons" style="font-size: 64px; color: #dc3545;">gpp_bad</span>
                        <h2>Área Administrativa</h2>
                        <p>Sua conta não possui privilégios de administrador.</p>
                        <button class="btn-primary" onclick="window.location.href='https://wiki.wazzimagiygg.com'" style="margin-top: 20px;">
                            Voltar para WikiZero
                        </button>
                    </div>
                </div>
            `;
        }
        
        function signIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                isAdmin = await checkIsAdmin(user);
                if (isAdmin) {
                    await scanAllCollections();
                } else {
                    renderAccessDenied();
                }
            } else {
                renderLoginScreen();
            }
        });
        
        // Expor funções globalmente
        window.filterCollections = filterCollections;
        window.viewDocuments = viewDocuments;
        window.closeModal = closeModal;
        window.exportToJSON = exportToJSON;
        window.refreshScan = refreshScan;
        window.signIn = signIn;
    </script>
</body>
</html>
