<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Custos - WZZM Admin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <style>
        body {
            font-family: 'Roboto', 'Helvetica', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 2px 0 rgba(0,0,0,.14), 0 3px 1px -2px rgba(0,0,0,.2), 0 1px 5px 0 rgba(0,0,0,.12);
        }
        .header h1 {
            color: #3f51b5;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-info {
            background: #e8eaf6;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 2px 0 rgba(0,0,0,.14);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #3f51b5;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        .filters {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 500;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .btn-primary {
            background: #3f51b5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #303f9f;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .table-container {
            background: white;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 2px 2px 0 rgba(0,0,0,.14);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            vertical-align: middle;
        }
        tr:hover {
            background: #f9f9f9;
        }
        .cost-value {
            font-weight: bold;
            color: #2e7d32;
        }
        .cost-negative {
            color: #c62828;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 20px;
        }
        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }
        .cost-detail {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <!-- Modal de Visualização -->
    <div id="view-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📄 Detalhes do Registro</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="loading">Carregando...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <script>
        // ============================================
        // CONFIGURAÇÃO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260",
            measurementId: "G-PLKNZNFCQ8"
        };

        let app;
        try {
            app = firebase.app();
        } catch (e) {
            app = firebase.initializeApp(firebaseConfig);
        }
        const firestore = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentUser = null;
        let isAdmin = false;
        let allCosts = [];
        let charts = {};

        // Administradores autorizados
        const ADMIN_UIDS = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1', '6aPqWVh8JVYL5NqEb78iDGPD7dH3'];

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function formatDate(date) {
            if (!date) return 'N/A';
            if (date.toDate) date = date.toDate();
            return date.toLocaleDateString('pt-BR');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkIsAdmin(user) {
            if (!user) return false;
            if (ADMIN_UIDS.includes(user.uid)) return true;
            try {
                const userDoc = await firestore.collection('users').doc(user.uid).get();
                return userDoc.exists && userDoc.data().isAdmin === true;
            } catch { return false; }
        }

        // Extrair valor monetário do conteúdo (exemplo)
        function extractCostValue(content) {
            if (!content) return null;
            // Procura por padrões como R$ 1.234,56 ou 1234.56
            const patterns = [
                /R\$\s*([\d\.,]+)/,
                /(\d{1,3}(?:\.\d{3})*,\d{2})/,
                /(\d+(?:\.\d+)?)/
            ];
            for (const pattern of patterns) {
                const match = content.match(pattern);
                if (match) {
                    let value = match[1].replace(/\./g, '').replace(',', '.');
                    const num = parseFloat(value);
                    if (!isNaN(num)) return num;
                }
            }
            return null;
        }

        // ============================================
        // FUNÇÃO PRINCIPAL - CARREGAR DADOS
        // ============================================
        
        async function loadCosts() {
            if (!isAdmin) return;
            
            showLoading();
            
            try {
                const snapshot = await firestore.collection('financialData')
                    .orderBy('lastModified', 'desc')
                    .get();
                
                const costs = [];
                let totalCost = 0;
                let costsWithValue = 0;
                
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    const content = data.formattedContent || '';
                    const costValue = extractCostValue(content);
                    
                    const costItem = {
                        id: doc.id,
                        title: data.title || 'Sem título',
                        description: data.description || '',
                        content: content,
                        costValue: costValue,
                        originalUrl: data.originalUrl || '',
                        sources: data.sources || [],
                        language: data.language || 'pt-BR',
                        articleType: data.articleType || 'noticia',
                        verificationStatus: data.verificationStatus || 'pending',
                        userId: data.userId || '',
                        timestamp: data.timestamp?.toDate() || null,
                        lastModified: data.lastModified?.toDate() || null
                    };
                    
                    if (costValue !== null && !isNaN(costValue)) {
                        totalCost += costValue;
                        costsWithValue++;
                    }
                    
                    costs.push(costItem);
                }
                
                allCosts = costs;
                renderDashboard(totalCost, costsWithValue, costs.length);
                
            } catch (error) {
                console.error('Erro ao carregar custos:', error);
                showError(error.message);
            }
        }
        
        function showLoading() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">receipt</span> Listagem de Custos</h1>
                        <p>Gerenciamento de prestações de contas e despesas</p>
                        <div class="admin-info" id="admin-info"></div>
                    </div>
                    <div class="loading">
                        <div class="mdl-spinner mdl-js-spinner is-active"></div>
                        <p>Carregando dados financeiros...</p>
                    </div>
                </div>
            `;
        }
        
        function showError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><span class="material-icons">error</span> Erro</h1>
                        <p>${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        
        function renderDashboard(totalCost, costsWithValue, totalRecords) {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>
                            <span class="material-icons">receipt</span>
                            Listagem de Custos - FinancialData
                        </h1>
                        <p>Gerencie prestações de contas, doações e despesas</p>
                        <div class="admin-info">
                            <div>
                                <span class="material-icons">admin_panel_settings</span>
                                Administrador: <strong>${escapeHtml(currentUser?.displayName || currentUser?.email)}</strong>
                            </div>
                            <div>
                                <a href="add-cost.html" class="btn-primary" style="text-decoration: none;">
                                    <span class="material-icons">add</span> Novo Registro
                                </a>
                                <button class="btn-secondary" onclick="refreshData()">
                                    <span class="material-icons">refresh</span> Atualizar
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Cards de Estatísticas -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${totalRecords}</div>
                            <div class="stat-label">Total de Registros</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${costsWithValue}</div>
                            <div class="stat-label">Registros com Valor</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value ${totalCost < 0 ? 'cost-negative' : ''}">${formatCurrency(totalCost)}</div>
                            <div class="stat-label">Valor Total</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${((costsWithValue / totalRecords) * 100).toFixed(1)}%</div>
                            <div class="stat-label">Taxa de Preenchimento</div>
                        </div>
                    </div>
                    
                    <!-- Filtros -->
                    <div class="filters">
                        <div class="filter-group">
                            <label>🔍 Buscar</label>
                            <input type="text" id="search-input" placeholder="Título, descrição..." onkeyup="filterCosts()">
                        </div>
                        <div class="filter-group">
                            <label>🏷️ Tipo</label>
                            <select id="type-filter" onchange="filterCosts()">
                                <option value="all">Todos</option>
                                <option value="cientifico">Prestação de Contas</option>
                                <option value="revisao">Recebimento de Doação</option>
                                <option value="noticia">Notificação</option>
                                <option value="editorial">Alerta</option>
                                <option value="opiniao">Informação</option>
                                <option value="entrevista">Aviso</option>
                                <option value="tutorial">Custos</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>📊 Status</label>
                            <select id="status-filter" onchange="filterCosts()">
                                <option value="all">Todos</option>
                                <option value="pending">Pendente</option>
                                <option value="approved">Aprovado</option>
                                <option value="rejected">Rejeitado</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>🌐 Idioma</label>
                            <select id="language-filter" onchange="filterCosts()">
                                <option value="all">Todos</option>
                                <option value="pt-BR">Português</option>
                                <option value="en-US">English</option>
                            </select>
                        </div>
                        <button class="btn-secondary" onclick="exportToCSV()">
                            <span class="material-icons">download</span> Exportar CSV
                        </button>
                    </div>
                    
                    <!-- Tabela de Custos -->
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Título</th>
                                    <th>Tipo</th>
                                    <th>Valor</th>
                                    <th>Status</th>
                                    <th>Última Modificação</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="costs-tbody">
                                <tr><td colspan="6" class="loading">Carregando registros...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            // Atualizar informações do admin
            const adminInfo = document.getElementById('admin-info');
            if (adminInfo) {
                adminInfo.innerHTML = `
                    <div>👤 ${escapeHtml(currentUser?.displayName || currentUser?.email)}</div>
                    <div><button class="btn-secondary" onclick="logout()">Sair</button></div>
                `;
            }
            
            filterCosts();
        }
        
        function renderCostsList() {
            const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
            const typeFilter = document.getElementById('type-filter')?.value || 'all';
            const statusFilter = document.getElementById('status-filter')?.value || 'all';
            const languageFilter = document.getElementById('language-filter')?.value || 'all';
            
            let filtered = [...allCosts];
            
            if (searchTerm) {
                filtered = filtered.filter(cost => 
                    cost.title.toLowerCase().includes(searchTerm) ||
                    cost.description.toLowerCase().includes(searchTerm)
                );
            }
            if (typeFilter !== 'all') {
                filtered = filtered.filter(cost => cost.articleType === typeFilter);
            }
            if (statusFilter !== 'all') {
                filtered = filtered.filter(cost => cost.verificationStatus === statusFilter);
            }
            if (languageFilter !== 'all') {
                filtered = filtered.filter(cost => cost.language === languageFilter);
            }
            
            const tbody = document.getElementById('costs-tbody');
            if (!tbody) return;
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">📭 Nenhum registro encontrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(cost => `
                <tr>
                    <td>
                        <strong>${escapeHtml(cost.title.substring(0, 50))}${cost.title.length > 50 ? '...' : ''}</strong>
                        ${cost.description ? `<br><small style="color:#666;">${escapeHtml(cost.description.substring(0, 40))}...</small>` : ''}
                    </td>
                    <td>${getTypeLabel(cost.articleType)}</td>
                    <td class="${cost.costValue !== null && cost.costValue < 0 ? 'cost-negative' : 'cost-value'}">
                        ${cost.costValue !== null ? formatCurrency(cost.costValue) : '—'}
                    </td>
                    <td>${getStatusBadge(cost.verificationStatus)}</td>
                    <td>${formatDate(cost.lastModified)}</td>
                    <td>
                        <button class="btn-secondary" style="padding: 4px 8px; margin: 2px;" onclick="viewCost('${cost.id}')" title="Visualizar">
                            <span class="material-icons" style="font-size: 16px;">visibility</span>
                        </button>
                        <a href="add-cost.html?id=${cost.id}" class="btn-secondary" style="padding: 4px 8px; margin: 2px; text-decoration: none; display: inline-block;" title="Editar">
                            <span class="material-icons" style="font-size: 16px;">edit</span>
                        </a>
                        <button class="btn-secondary btn-danger" style="padding: 4px 8px; margin: 2px;" onclick="deleteCost('${cost.id}')" title="Excluir">
                            <span class="material-icons" style="font-size: 16px;">delete</span>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getTypeLabel(type) {
            const types = {
                'cientifico': '📊 Prestação de Contas',
                'revisao': '💰 Recebimento de Doação',
                'noticia': '📢 Notificação',
                'editorial': '⚠️ Alerta',
                'opiniao': 'ℹ️ Informação',
                'entrevista': '📣 Aviso',
                'tutorial': '📋 Custos'
            };
            return types[type] || type;
        }
        
        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="status-badge status-pending">⏳ Pendente</span>',
                'approved': '<span class="status-badge status-approved">✅ Aprovado</span>',
                'rejected': '<span class="status-badge status-rejected">❌ Rejeitado</span>'
            };
            return badges[status] || '<span class="status-badge">❓ Desconhecido</span>';
        }
        
        function filterCosts() {
            renderCostsList();
        }
        
        // ============================================
        // FUNÇÕES DE AÇÃO
        // ============================================
        
        async function viewCost(costId) {
            const cost = allCosts.find(c => c.id === costId);
            if (!cost) return;
            
            const modal = document.getElementById('view-modal');
            const modalBody = document.getElementById('modal-body');
            
            modalBody.innerHTML = `
                <div class="cost-detail">
                    <p><strong>📌 Título:</strong> ${escapeHtml(cost.title)}</p>
                    <p><strong>📝 Descrição:</strong> ${escapeHtml(cost.description) || 'N/A'}</p>
                    <p><strong>💰 Valor:</strong> <span class="${cost.costValue !== null && cost.costValue < 0 ? 'cost-negative' : 'cost-value'}">${cost.costValue !== null ? formatCurrency(cost.costValue) : 'Não identificado'}</span></p>
                    <p><strong>🏷️ Tipo:</strong> ${getTypeLabel(cost.articleType)}</p>
                    <p><strong>📊 Status:</strong> ${getStatusBadge(cost.verificationStatus)}</p>
                    <p><strong>🌐 Idioma:</strong> ${cost.language === 'pt-BR' ? 'Português (Brasil)' : 'English (US)'}</p>
                    <p><strong>📅 Criado em:</strong> ${formatDate(cost.timestamp)}</p>
                    <p><strong>🔄 Última modificação:</strong> ${formatDate(cost.lastModified)}</p>
                    <p><strong>👤 Criado por:</strong> ${escapeHtml(cost.userId) || 'N/A'}</p>
                    ${cost.originalUrl ? `<p><strong>🔗 URL Original:</strong> <a href="${cost.originalUrl}" target="_blank">${cost.originalUrl}</a></p>` : ''}
                    ${cost.sources && cost.sources.length ? `<p><strong>📚 Fontes:</strong> ${cost.sources.join(', ')}</p>` : ''}
                </div>
                <div class="cost-detail">
                    <strong>📄 Conteúdo:</strong>
                    <div style="margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 5px; max-height: 400px; overflow-y: auto;">
                        ${cost.content || '<em>Sem conteúdo</em>'}
                    </div>
                </div>
            `;
            
            modal.style.display = 'flex';
        }
        
        async function deleteCost(costId) {
            if (!confirm('⚠️ Tem certeza que deseja excluir este registro permanentemente? Esta ação não pode ser desfeita.')) {
                return;
            }
            
            try {
                await firestore.collection('financialData').doc(costId).delete();
                alert('✅ Registro excluído com sucesso!');
                await loadCosts();
            } catch (error) {
                console.error('Erro ao excluir:', error);
                alert('❌ Erro ao excluir: ' + error.message);
            }
        }
        
        function refreshData() {
            loadCosts();
        }
        
        function exportToCSV() {
            // Filtra os dados atuais
            const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
            const typeFilter = document.getElementById('type-filter')?.value || 'all';
            
            let filtered = [...allCosts];
            if (searchTerm) {
                filtered = filtered.filter(cost => 
                    cost.title.toLowerCase().includes(searchTerm) ||
                    cost.description.toLowerCase().includes(searchTerm)
                );
            }
            if (typeFilter !== 'all') {
                filtered = filtered.filter(cost => cost.articleType === typeFilter);
            }
            
            // Criar cabeçalho CSV
            const headers = ['ID', 'Título', 'Descrição', 'Valor', 'Tipo', 'Status', 'Idioma', 'Data Criação', 'Última Modificação', 'Usuário', 'URL Original'];
            const rows = filtered.map(cost => [
                cost.id,
                `"${cost.title.replace(/"/g, '""')}"`,
                `"${(cost.description || '').replace(/"/g, '""')}"`,
                cost.costValue !== null ? cost.costValue : '',
                getTypeLabel(cost.articleType),
                cost.verificationStatus,
                cost.language,
                formatDate(cost.timestamp),
                formatDate(cost.lastModified),
                cost.userId,
                cost.originalUrl || ''
            ]);
            
            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `custos_${new Date().toISOString().slice(0, 19)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function closeModal() {
            document.getElementById('view-modal').style.display = 'none';
        }
        
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }
        
        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        
        function renderLoginScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">receipt</span> Listagem de Custos</h1>
                        <p>Faça login para acessar o sistema financeiro</p>
                    </div>
                    <div style="background: white; border-radius: 8px; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;">
                        <span class="material-icons" style="font-size: 64px; color: #3f51b5;">account_circle</span>
                        <h2 style="margin: 20px 0;">Área Restrita</h2>
                        <button class="btn-primary" onclick="signIn()">🔑 Entrar com Google</button>
                    </div>
                </div>
            `;
        }
        
        function renderAccessDenied() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div class="header" style="text-align: center;">
                        <h1><span class="material-icons">lock</span> Acesso Negado</h1>
                        <p>Você não tem permissão para acessar esta área.</p>
                    </div>
                </div>
            `;
        }
        
        function signIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                isAdmin = await checkIsAdmin(user);
                if (isAdmin) {
                    await loadCosts();
                } else {
                    renderAccessDenied();
                }
            } else {
                renderLoginScreen();
            }
        });
        
        // Expor funções globalmente
        window.filterCosts = filterCosts;
        window.viewCost = viewCost;
        window.deleteCost = deleteCost;
        window.refreshData = refreshData;
        window.exportToCSV = exportToCSV;
        window.closeModal = closeModal;
        window.signIn = signIn;
        window.logout = logout;
    </script>
</body>
</html>
