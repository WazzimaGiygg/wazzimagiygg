<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Notificações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4a6cf7;
            --primary-dark: #3a56d4;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --gray: #6c757d;
            --light: #f8f9fa;
            --dark: #1a1a2e;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8ecf1 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--dark), #2d2d44);
            color: white;
            padding: 20px 30px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }

        .header .logo i {
            font-size: 28px;
            color: #ff6b6b;
        }

        .header .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header .user-area .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            overflow: hidden;
        }

        .header .user-area .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-logout {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.25);
        }

        /* CARDS */
        .card {
            background: white;
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border-top: 4px solid var(--primary);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title i {
            color: var(--primary);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--dark);
        }

        .form-group label i {
            color: var(--primary);
            margin-right: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.1);
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-row .form-control {
            flex: 1;
        }

        /* BUTTONS */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(74, 108, 247, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--gray);
            color: white;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* NOTIFICAÇÕES LIST */
        .notifications-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .notif-item {
            background: var(--light);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .notif-item:hover {
            background: white;
            box-shadow: var(--shadow);
        }

        .notif-item .info {
            flex: 1;
        }

        .notif-item .titulo {
            font-weight: 700;
            font-size: 15px;
            color: var(--dark);
        }

        .notif-item .mensagem {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
        }

        .notif-item .meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--gray);
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .notif-item .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-lida {
            background: #d4edda;
            color: var(--success);
        }

        .badge-nao-lida {
            background: #fee;
            color: var(--danger);
        }

        .badge-advertencia {
            background: #fff3cd;
            color: #856404;
        }

        .badge-sistema {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge-ticket {
            background: #cce5ff;
            color: #004085;
        }

        .notif-item .acoes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 48px;
            opacity: 0.4;
            margin-bottom: 12px;
            display: block;
        }

        /* MESSAGES */
        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 12px;
            border-left: 4px solid transparent;
            animation: slideIn 0.3s ease;
        }

        .message.show {
            display: flex;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-success { background: #d4edda; border-color: var(--success); color: #155724; }
        .message-error { background: #f8d7da; border-color: var(--danger); color: #721c24; }
        .message-warning { background: #fff3cd; border-color: var(--warning); color: #856404; }
        .message-info { background: #d1ecf1; border-color: var(--info); color: #0c5460; }

        /* LOGIN OVERLAY */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: white;
            border-radius: 24px;
            padding: 50px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box .icon-big {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .login-box h2 {
            color: var(--dark);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-google {
            background: linear-gradient(135deg, #DB4437, #C33C2F);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(219, 68, 55, 0.3);
        }

        .login-status {
            margin-top: 16px;
            padding: 12px;
            background: var(--light);
            border-radius: 8px;
            font-size: 13px;
            color: var(--gray);
        }

        @media (max-width: 992px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .search-row {
                flex-direction: column;
            }

            .search-row .btn {
                width: 100%;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .header .user-area {
                justify-content: center;
            }

            .notif-item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <div class="icon-big">🔐</div>
        <h2>Gerenciador de Notificações</h2>
        <p>Faça login para gerenciar notificações do sistema.</p>
        <button id="btnGoogleLogin" class="btn-google">
            <i class="fab fa-google"></i> Entrar com Google
        </button>
        <div class="login-status" id="loginStatus">Aguardando login...</div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <span>Gerenciador de Notificações</span>
            </div>
            <div class="user-area">
                <div class="avatar" id="userAvatar">A</div>
                <span class="user-name" id="userName">Administrador</span>
                <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>

        <!-- MESSAGES -->
        <div id="messageArea"></div>

        <!-- MAIN GRID -->
        <div class="grid-2">
            <!-- LEFT CARD - FORM -->
            <div class="card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Nova Notificação</div>
                <form id="notifForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Usuário Destino</label>
                        <div class="search-row">
                            <input type="text" id="userId" class="form-control" placeholder="UID do usuário" required>
                            <button type="button" id="btnBuscarUsuario" class="btn btn-primary btn-sm">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <div id="usuarioInfo" style="display:none;margin-top:8px;padding:8px 12px;background:var(--light);border-radius:8px;font-size:13px;">
                            <i class="fas fa-check-circle" style="color:var(--success);"></i>
                            <span id="usuarioNome">Usuário</span>
                            <span style="color:var(--gray);margin-left:8px;" id="usuarioEmail"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Título *</label>
                        <input type="text" id="titulo" class="form-control" placeholder="Ex: Nova Advertência" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Mensagem *</label>
                        <textarea id="mensagem" class="form-control" placeholder="Conteúdo da notificação..." rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Tipo</label>
                        <select id="tipo" class="form-control">
                            <option value="sistema">📢 Sistema</option>
                            <option value="advertencia" selected>⚠️ Advertência</option>
                            <option value="ticket">🎫 Ticket</option>
                            <option value="moderacao">⚖️ Moderação</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Enviar</button>
                        <button type="button" id="btnLimpar" class="btn btn-secondary"><i class="fas fa-broom"></i> Limpar</button>
                    </div>
                </form>
            </div>

            <!-- RIGHT CARD - STATS -->
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-bar"></i> Estatísticas</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
                    <div style="background:var(--light);padding:20px;border-radius:12px;text-align:center;border:1px solid #e9ecef;">
                        <div style="font-size:32px;font-weight:800;color:var(--primary);" id="totalNotif">0</div>
                        <div style="font-size:13px;color:var(--gray);">Total</div>
                    </div>
                    <div style="background:var(--light);padding:20px;border-radius:12px;text-align:center;border:1px solid #e9ecef;">
                        <div style="font-size:32px;font-weight:800;color:var(--danger);" id="naoLidas">0</div>
                        <div style="font-size:13px;color:var(--gray);">Não lidas</div>
                    </div>
                    <div style="background:var(--light);padding:20px;border-radius:12px;text-align:center;border:1px solid #e9ecef;">
                        <div style="font-size:32px;font-weight:800;color:var(--success);" id="lidas">0</div>
                        <div style="font-size:13px;color:var(--gray);">Lidas</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- LIST CARD -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                <div class="card-title" style="margin-bottom:0;"><i class="fas fa-list"></i> Notificações</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <input type="text" id="filterUserId" class="form-control" style="width:200px;padding:8px 12px;" placeholder="Filtrar por UID...">
                    <button id="btnFiltrar" class="btn btn-primary btn-sm"><i class="fas fa-filter"></i> Filtrar</button>
                    <button id="btnLimparFiltro" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="notificationsList">
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <p>Nenhuma notificação encontrada</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
    authDomain: "wzzm-ce3fc.firebaseapp.com",
    projectId: "wzzm-ce3fc",
    storageBucket: "wzzm-ce3fc.appspot.com",
    messagingSenderId: "249427877153",
    appId: "1:249427877153:web:0e4297294794a5aadeb260"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ============================================================
// VARIÁVEIS GLOBAIS
// ============================================================
let currentUser = null;
let currentUserIsAdmin = false;
let allNotifications = [];
let filteredNotifications = [];
let selectedUserId = null;

// ============================================================
// DOM REFS
// ============================================================
const $ = id => document.getElementById(id);
const loginOverlay = $('loginOverlay');
const mainContent = $('mainContent');
const loginStatus = $('loginStatus');
const btnGoogleLogin = $('btnGoogleLogin');
const btnLogout = $('btnLogout');
const userAvatar = $('userAvatar');
const userName = $('userName');
const messageArea = $('messageArea');
const userIdInput = $('userId');
const tituloInput = $('titulo');
const mensagemInput = $('mensagem');
const tipoSelect = $('tipo');
const notifForm = $('notifForm');
const notificationsList = $('notificationsList');
const totalNotif = $('totalNotif');
const naoLidas = $('naoLidas');
const lidas = $('lidas');
const btnLimpar = $('btnLimpar');
const btnBuscarUsuario = $('btnBuscarUsuario');
const usuarioInfo = $('usuarioInfo');
const usuarioNome = $('usuarioNome');
const usuarioEmail = $('usuarioEmail');
const filterUserId = $('filterUserId');
const btnFiltrar = $('btnFiltrar');
const btnLimparFiltro = $('btnLimparFiltro');

// ============================================================
// FUNÇÕES DE UTILIDADE
// ============================================================

function showMessage(text, type = 'info') {
    const div = document.createElement('div');
    div.className = `message message-${type} show`;
    div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i> ${text}`;
    messageArea.innerHTML = '';
    messageArea.appendChild(div);
    setTimeout(() => {
        div.classList.remove('show');
        setTimeout(() => messageArea.innerHTML = '', 300);
    }, 5000);
}

function formatDate(date) {
    if (!date) return 'Data não registrada';
    if (date.toDate) date = date.toDate();
    if (typeof date === 'string') date = new Date(date);
    return date.toLocaleDateString('pt-BR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

function getTipoBadge(tipo) {
    const map = {
        'advertencia': 'badge-advertencia',
        'sistema': 'badge-sistema',
        'ticket': 'badge-ticket',
        'moderacao': 'badge-sistema'
    };
    return map[tipo] || 'badge-sistema';
}

function getTipoIcon(tipo) {
    const map = {
        'advertencia': '⚠️',
        'sistema': '📢',
        'ticket': '🎫',
        'moderacao': '⚖️'
    };
    return map[tipo] || '📢';
}

function getTipoLabel(tipo) {
    const map = {
        'advertencia': 'Advertência',
        'sistema': 'Sistema',
        'ticket': 'Ticket',
        'moderacao': 'Moderação'
    };
    return map[tipo] || 'Sistema';
}

// ============================================================
// FUNÇÃO PARA CRIAR NOTIFICAÇÃO
// ============================================================

async function criarNotificacao(userId, titulo, mensagem, tipo = 'sistema') {
    if (!userId || !titulo || !mensagem) {
        showMessage('❌ Preencha todos os campos obrigatórios.', 'error');
        return false;
    }

    try {
        const notifData = {
            userId: userId,
            titulo: titulo,
            mensagem: mensagem,
            lida: false,
            tipo: tipo,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            dados: {},
            criadoPor: {
                id: currentUser.uid,
                nome: currentUser.displayName || 'Administrador',
                email: currentUser.email
            }
        };

        await db.collection('notifications').add(notifData);
        console.log(`✅ Notificação criada para ${userId}: ${titulo}`);
        showMessage(`✅ Notificação enviada para ${userId}`, 'success');
        return true;
    } catch (error) {
        console.error('❌ Erro ao criar notificação:', error);
        showMessage('❌ Erro ao criar notificação: ' + error.message, 'error');
        return false;
    }
}

// ============================================================
// CARREGAR NOTIFICAÇÕES
// ============================================================

async function loadNotifications(filterUid = null) {
    try {
        let query = db.collection('notifications').orderBy('timestamp', 'desc');

        if (filterUid) {
            query = query.where('userId', '==', filterUid);
        }

        const snapshot = await query.get();
        allNotifications = [];

        snapshot.forEach(doc => {
            allNotifications.push({
                id: doc.id,
                ...doc.data(),
                timestamp: doc.data().timestamp || new Date()
            });
        });

        filteredNotifications = [...allNotifications];
        renderNotifications();
        updateStats();

    } catch (error) {
        console.error('❌ Erro ao carregar notificações:', error);
        showMessage('❌ Erro ao carregar notificações: ' + error.message, 'error');
    }
}

function renderNotifications() {
    if (filteredNotifications.length === 0) {
        notificationsList.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <p>Nenhuma notificação encontrada</p>
            </div>
        `;
        return;
    }

    notificationsList.innerHTML = filteredNotifications.map(notif => `
        <div class="notif-item">
            <div class="info">
                <div class="titulo">${getTipoIcon(notif.tipo)} ${escapeHtml(notif.titulo || 'Notificação')}</div>
                <div class="mensagem">${escapeHtml(notif.mensagem || '')}</div>
                <div class="meta">
                    <span style="font-size:11px;color:var(--gray);">
                        <i class="far fa-calendar"></i> ${formatDate(notif.timestamp)}
                    </span>
                    <span class="badge ${getTipoBadge(notif.tipo)}">${getTipoLabel(notif.tipo)}</span>
                    <span class="badge ${notif.lida ? 'badge-lida' : 'badge-nao-lida'}">
                        ${notif.lida ? '✅ Lida' : '🔵 Não lida'}
                    </span>
                    <span style="font-size:11px;color:var(--gray);">
                        <i class="fas fa-user"></i> ${notif.userId ? notif.userId.substring(0,12) + '...' : 'N/A'}
                    </span>
                    ${notif.criadoPor ? `
                        <span style="font-size:11px;color:var(--gray);">
                            <i class="fas fa-user-shield"></i> ${notif.criadoPor.nome || 'Sistema'}
                        </span>
                    ` : ''}
                </div>
            </div>
            <div class="acoes">
                ${!notif.lida ? `
                    <button class="btn btn-sm btn-success" onclick="marcarComoLida('${notif.id}')">
                        <i class="fas fa-check"></i> Marcar lida
                    </button>
                ` : ''}
                <button class="btn btn-sm btn-danger" onclick="excluirNotificacao('${notif.id}')">
                    <i class="fas fa-trash"></i> Excluir
                </button>
            </div>
        </div>
    `).join('');
}

function updateStats() {
    const total = allNotifications.length;
    const naoLidasCount = allNotifications.filter(n => !n.lida).length;
    const lidasCount = total - naoLidasCount;

    totalNotif.textContent = total;
    naoLidas.textContent = naoLidasCount;
    lidas.textContent = lidasCount;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================================
// OPERAÇÕES CRUD
// ============================================================

async function marcarComoLida(notifId) {
    try {
        await db.collection('notifications').doc(notifId).update({
            lida: true
        });

        const notif = allNotifications.find(n => n.id === notifId);
        if (notif) notif.lida = true;

        renderNotifications();
        updateStats();
        showMessage('✅ Notificação marcada como lida', 'success');
    } catch (error) {
        console.error('❌ Erro ao marcar como lida:', error);
        showMessage('❌ Erro ao marcar como lida: ' + error.message, 'error');
    }
}

async function excluirNotificacao(notifId) {
    if (!confirm('Tem certeza que deseja excluir esta notificação permanentemente?')) return;

    try {
        await db.collection('notifications').doc(notifId).delete();

        const index = allNotifications.findIndex(n => n.id === notifId);
        if (index !== -1) allNotifications.splice(index, 1);

        filteredNotifications = [...allNotifications];
        renderNotifications();
        updateStats();
        showMessage('✅ Notificação excluída com sucesso', 'success');
    } catch (error) {
        console.error('❌ Erro ao excluir notificação:', error);
        showMessage('❌ Erro ao excluir notificação: ' + error.message, 'error');
    }
}

// ============================================================
// BUSCAR USUÁRIO
// ============================================================

async function buscarUsuario(uid) {
    if (!uid) {
        showMessage('❌ Digite um UID para buscar.', 'warning');
        return null;
    }

    try {
        const doc = await db.collection('userpage').doc(uid).get();

        if (doc.exists) {
            const data = doc.data();
            const name = data.dadosCadastro?.nomeCompleto || data.criadorNome || 'Usuário';
            const email = data.dadosCadastro?.email || data.criadorEmail || 'Email não disponível';

            usuarioInfo.style.display = 'block';
            usuarioNome.textContent = name;
            usuarioEmail.textContent = email;

            return { uid, name, email };
        } else {
            usuarioInfo.style.display = 'block';
            usuarioNome.textContent = 'Usuário sem página';
            usuarioEmail.textContent = 'UID: ' + uid.substring(0, 12);

            return { uid, name: 'Usuário sem página', email: 'N/A' };
        }
    } catch (error) {
        console.error('❌ Erro ao buscar usuário:', error);
        showMessage('❌ Erro ao buscar usuário: ' + error.message, 'error');
        return null;
    }
}

// ============================================================
// AUTENTICAÇÃO
// ============================================================

async function checkAdminStatus(user) {
    if (!user) return false;
    const adminUIDs = ['sZxfMuOBPbXdR8nttVPXIN8QOOl1'];
    if (adminUIDs.includes(user.uid)) return true;
    try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists && doc.data().isAdmin === true) return true;
    } catch (e) { console.log('Erro ao verificar admin:', e); }
    return false;
}

async function loginWithGoogle() {
    try {
        btnGoogleLogin.disabled = true;
        btnGoogleLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aguarde...';
        loginStatus.textContent = 'Abrindo janela de login...';

        const result = await auth.signInWithPopup(googleProvider);
        const isAdmin = await checkAdminStatus(result.user);

        if (isAdmin) {
            currentUser = result.user;
            currentUserIsAdmin = true;
            showMessage('✅ Login realizado com sucesso!', 'success');
            updateUI();
            await loadNotifications();
        } else {
            await auth.signOut();
            loginStatus.textContent = '❌ Acesso negado. Você não é administrador.';
            showMessage('❌ Esta conta não tem permissões de administrador.', 'error');
        }
    } catch (error) {
        console.error('Erro no login:', error);
        loginStatus.textContent = '❌ Erro: ' + error.message;
        showMessage('❌ Erro ao fazer login: ' + error.message, 'error');
    } finally {
        btnGoogleLogin.disabled = false;
        btnGoogleLogin.innerHTML = '<i class="fab fa-google"></i> Entrar com Google';
    }
}

async function logout() {
    try {
        await auth.signOut();
        currentUser = null;
        currentUserIsAdmin = false;
        loginOverlay.classList.remove('hidden');
        mainContent.style.display = 'none';
        loginStatus.textContent = 'Desconectado';
        showMessage('✅ Logout realizado com sucesso.', 'success');
    } catch (error) {
        showMessage('❌ Erro ao fazer logout: ' + error.message, 'error');
    }
}

function updateUI() {
    if (!currentUser) return;
    loginOverlay.classList.add('hidden');
    mainContent.style.display = 'block';

    const name = currentUser.displayName || 'Administrador';
    userName.textContent = name;

    if (currentUser.photoURL) {
        userAvatar.innerHTML = `<img src="${currentUser.photoURL}" alt="Avatar">`;
    } else {
        userAvatar.textContent = name.charAt(0).toUpperCase();
    }

    loginStatus.textContent = `Logado como: ${currentUser.email}`;
}

// ============================================================
// EVENT LISTENERS
// ============================================================

btnGoogleLogin.addEventListener('click', loginWithGoogle);
btnLogout.addEventListener('click', logout);

// Enviar notificação
notifForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const userId = userIdInput.value.trim();
    const titulo = tituloInput.value.trim();
    const mensagem = mensagemInput.value.trim();
    const tipo = tipoSelect.value;

    if (!userId) {
        showMessage('❌ Digite o UID do usuário.', 'warning');
        return;
    }

    const success = await criarNotificacao(userId, titulo, mensagem, tipo);

    if (success) {
        notifForm.reset();
        usuarioInfo.style.display = 'none';
        await loadNotifications();
    }
});

// Buscar usuário
btnBuscarUsuario.addEventListener('click', async () => {
    const uid = userIdInput.value.trim();
    if (uid) {
        await buscarUsuario(uid);
        userIdInput.value = uid;
    } else {
        showMessage('❌ Digite um UID para buscar.', 'warning');
    }
});

userIdInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') btnBuscarUsuario.click();
});

// Limpar formulário
btnLimpar.addEventListener('click', () => {
    notifForm.reset();
    usuarioInfo.style.display = 'none';
    showMessage('📋 Formulário limpo', 'info');
});

// Filtrar notificações
btnFiltrar.addEventListener('click', () => {
    const filterUid = filterUserId.value.trim();
    if (filterUid) {
        loadNotifications(filterUid);
    } else {
        loadNotifications();
    }
});

btnLimparFiltro.addEventListener('click', () => {
    filterUserId.value = '';
    loadNotifications();
});

filterUserId.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') btnFiltrar.click();
});

// ============================================================
// AUTH STATE
// ============================================================

auth.onAuthStateChanged(async (user) => {
    if (user) {
        const isAdmin = await checkAdminStatus(user);
        if (isAdmin) {
            currentUser = user;
            currentUserIsAdmin = true;
            updateUI();
            await loadNotifications();
            showMessage('✅ Bem-vindo ao Gerenciador de Notificações!', 'success');
        } else {
            await auth.signOut();
            loginStatus.textContent = '❌ Acesso negado. Você não é administrador.';
        }
    } else {
        currentUser = null;
        currentUserIsAdmin = false;
        loginOverlay.classList.remove('hidden');
        mainContent.style.display = 'none';
        loginStatus.textContent = 'Aguardando login...';
    }
});

console.log('🚀 Gerenciador de Notificações carregado!');
console.log('📌 Coleção: notifications');
console.log('🔔 Admin pode criar e gerenciar notificações para qualquer usuário');
</script>
